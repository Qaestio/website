<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team — VCT 2026</title>
    <style>
        :root {
            --bg:       #0f0f0f;
            --surface:  #161616;
            --surface2: #1e1e1e;
            --border:   #272727;
            --text:     #e0e0e0;
            --muted:    #888;
            --dim:      #4a4a4a;
            --win:      #52c77a;
            --loss:     #e05252;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; flex-direction: column; overflow: hidden; }

        /* ── Topbar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0 1.25rem;
            height: 52px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .back-link:hover { color: var(--text); }
        .topbar-title {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Main scroll ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.25rem 3rem;
        }
        .main::-webkit-scrollbar       { width: 5px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        .content {
            max-width: 960px;
            margin: 0 auto;
        }

        /* ── Team hero ── */
        .team-hero {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--rc, var(--border));
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        .hero-logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 4px;
        }
        .hero-logo-ph {
            width: 72px;
            height: 72px;
            background: var(--surface2);
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dim);
        }
        .hero-info { flex: 1; min-width: 0; }
        .hero-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .region-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
            letter-spacing: 0.04em;
            margin-bottom: 0.6rem;
        }
        .hero-record {
            display: flex;
            gap: 1.5rem;
        }
        .record-item { text-align: center; }
        .record-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 3px;
        }
        .record-val {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .record-val .w   { color: var(--win); }
        .record-val .l   { color: var(--loss); }
        .record-val .sep { color: var(--dim); }

        /* ── Two-column page grid ── */
        .page-grid {
            display: grid;
            grid-template-columns: 1fr 272px;
            gap: 1.25rem;
            align-items: start;
        }
        @media (max-width: 760px) {
            .page-grid { grid-template-columns: 1fr; }
        }

        /* ── Section title ── */
        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.65rem;
        }

        /* ── Match list ── */
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        /* ── Match card ── */
        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--mc, var(--border));
            border-radius: 8px;
            overflow: hidden;
        }

        .match-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.9rem;
        }

        .result-badge {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.68rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .result-badge.win  { background: rgba(82,199,122,0.15); color: var(--win); }
        .result-badge.loss { background: rgba(224,82,82,0.15);  color: var(--loss); }

        .match-score {
            font-size: 0.88rem;
            font-weight: 700;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            min-width: 2.8rem;
            text-align: center;
        }
        .match-score .w   { color: var(--win); }
        .match-score .l   { color: var(--loss); }
        .match-score .sep { color: var(--dim); }

        .vs-text {
            font-size: 0.68rem;
            color: var(--dim);
            flex-shrink: 0;
        }

        .match-opponent {
            font-size: 0.88rem;
            font-weight: 600;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-event-label {
            font-size: 0.65rem;
            color: var(--muted);
            flex-shrink: 0;
            text-align: right;
        }

        /* ── Map rows ── */
        .match-maps {
            border-top: 1px solid var(--border);
            padding: 0.35rem 0.9rem 0.4rem 2.9rem;
        }
        .map-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.17rem 0;
            font-size: 0.78rem;
        }
        .map-name {
            color: var(--muted);
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 1rem;
        }
        .map-score {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            flex-shrink: 0;
        }
        .map-score.win  { color: var(--win); }
        .map-score.loss { color: var(--loss); }

        /* ── Map stats panel (right column) ── */
        .map-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 0.85rem 0.85rem;
        }

        .map-stat-list {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .map-stat-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.22rem 0;
        }

        .map-stat-name {
            width: 60px;
            flex-shrink: 0;
            font-size: 0.72rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .map-stat-bar-wrap {
            flex: 1;
            height: 7px;
            border-radius: 3px;
            overflow: hidden;
            background: var(--surface2);
            display: flex;
        }

        .bar-seg {
            height: 100%;
        }
        .bar-firstban  { background: #e05252; }
        .bar-firstpick { background: #52c77a; }
        .bar-secondban { background: #f0923b; }
        .bar-other     { background: #3d3d3d; }
        .bar-played    { background: #52c77a; }

        .map-stat-count {
            width: 20px;
            flex-shrink: 0;
            text-align: right;
            font-size: 0.62rem;
            color: var(--dim);
            font-variant-numeric: tabular-nums;
        }

        /* ── Legend ── */
        .map-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem 0.75rem;
            margin-top: 0.75rem;
            padding-top: 0.65rem;
            border-top: 1px solid var(--border);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.62rem;
            color: var(--muted);
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .map-note {
            font-size: 0.62rem;
            color: var(--dim);
            margin-top: 0.6rem;
            line-height: 1.5;
        }

        /* ── Status ── */
        .status {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
            font-size: 0.88rem;
        }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--muted);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .no-history {
            padding: 1.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            line-height: 1.6;
        }
        .no-history code {
            background: var(--surface2);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.82em;
        }

        @media (max-width: 540px) {
            .match-event-label { display: none; }
            .match-maps { padding-left: 0.9rem; }
            .hero-name  { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a class="back-link" href="valorant.html">← Teams</a>
    <span class="topbar-title" id="pageTitle"></span>
</div>

<div class="main">
    <div id="statusEl" class="status"><span class="spinner"></span> Loading…</div>
    <div id="content" class="content" style="display:none"></div>
</div>

<script>
const REGIONS = {
    americas: { label: 'Americas', rawColor: '#f0923b', bg: 'rgba(240,146,59,0.13)'  },
    emea:     { label: 'EMEA',     rawColor: '#f0c040', bg: 'rgba(240,192,64,0.13)'  },
    pacific:  { label: 'Pacific',  rawColor: '#5b9cf6', bg: 'rgba(91,156,246,0.13)'  },
    china:    { label: 'China',    rawColor: '#e05252', bg: 'rgba(224,82,82,0.13)'   },
};

function setStatus(html) {
    const el = document.getElementById('statusEl');
    el.innerHTML = html;
    el.style.display = '';
    document.getElementById('content').style.display = 'none';
}

function clearStatus() {
    document.getElementById('statusEl').style.display = 'none';
    document.getElementById('content').style.display = '';
}

async function init() {
    const teamName = new URLSearchParams(location.search).get('team');
    if (!teamName) {
        setStatus('No team specified. <a href="valorant.html" style="color:var(--muted)">← Go back</a>');
        return;
    }

    let data;
    try {
        const r = await fetch('./vct_data.json', { cache: 'no-cache' });
        if (!r.ok) throw new Error('fetch failed');
        data = await r.json();
    } catch (e) {
        setStatus('Could not load data. <a href="valorant.html" style="color:var(--muted)">← Go back</a>');
        return;
    }

    const team = (data.teams || []).find(
        t => t.name.toLowerCase() === teamName.toLowerCase()
    );
    if (!team) {
        setStatus(`Team "${teamName}" not found. <a href="valorant.html" style="color:var(--muted)">← Go back</a>`);
        return;
    }

    renderTeam(team);
}

// ── Map statistics ─────────────────────────────────────────────────────────────

const MAP_LABEL_SUFFIXES = ['PICK', 'BAN', 'DECIDER'];

function cleanMapName(name) {
    if (!name) return name;
    const upper = name.toUpperCase();
    for (const suf of MAP_LABEL_SUFFIXES) {
        if (upper.endsWith(suf)) return name.slice(0, -suf.length).trim();
    }
    return name;
}

function computeMapStats(team) {
    // stats[mapName] = {firstBan, firstPick, secondBan, other, played, wins}
    const stats = {};
    let hasVeto = false;

    for (const match of team.matches || []) {

        // Played maps
        for (const mapData of match.maps || []) {
            const m = cleanMapName(mapData.map);
            if (!stats[m]) stats[m] = { firstBan:0, firstPick:0, secondBan:0, other:0, played:0, wins:0 };
            stats[m].played++;
            if ((mapData.score || [])[0] > (mapData.score || [])[1]) stats[m].wins++;
        }

        // Veto sequence — each step categorised from this team's perspective
        if (match.veto && match.veto.length > 0) {
            hasVeto = true;
            let ourBans = 0, ourPicks = 0;

            for (const step of (match.veto || [])) {
                const m = cleanMapName(step.map);
                if (!m) continue;
                if (!stats[m]) stats[m] = { firstBan:0, firstPick:0, secondBan:0, other:0, played:0, wins:0 };

                const byUs = step.team &&
                    step.team.toLowerCase() === team.name.toLowerCase();

                if (byUs) {
                    if (step.action === 'ban') {
                        ourBans++;
                        if (ourBans === 1) stats[m].firstBan++;
                        else               stats[m].secondBan++;
                    } else if (step.action === 'pick') {
                        ourPicks++;
                        stats[m].firstPick++;
                    } else {
                        stats[m].other++; // decider
                    }
                } else {
                    stats[m].other++;
                }
            }
        }
    }

    return { stats, hasVeto };
}

function renderMapStats(team, panel) {
    const { stats, hasVeto } = computeMapStats(team);

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'Map Statistics';
    panel.appendChild(title);

    const inner = document.createElement('div');
    inner.className = 'map-panel';
    panel.appendChild(inner);

    // Sort maps by total veto appearances (or played count) descending
    const mapEntries = Object.entries(stats).sort(([na, a], [nb, b]) => {
        const ta = hasVeto ? (a.firstBan + a.firstPick + a.secondBan + a.other) : a.played;
        const tb = hasVeto ? (b.firstBan + b.firstPick + b.secondBan + b.other) : b.played;
        return tb - ta || na.localeCompare(nb);
    });

    if (mapEntries.length === 0) {
        const msg = document.createElement('div');
        msg.style.cssText = 'font-size:0.8rem;color:var(--muted);padding:0.5rem 0;';
        msg.textContent = 'No data yet.';
        inner.appendChild(msg);
        return;
    }

    const list = document.createElement('div');
    list.className = 'map-stat-list';

    for (const [mapName, s] of mapEntries) {
        const total = hasVeto
            ? (s.firstBan + s.firstPick + s.secondBan + s.other)
            : s.played;
        if (total === 0) continue;

        const row = document.createElement('div');
        row.className = 'map-stat-row';

        const nameEl = document.createElement('span');
        nameEl.className = 'map-stat-name';
        nameEl.textContent = mapName;
        nameEl.title = mapName;

        const barWrap = document.createElement('div');
        barWrap.className = 'map-stat-bar-wrap';

        if (hasVeto) {
            const segs = [
                { cls: 'bar-firstban',  count: s.firstBan,  tip: '1st Ban'  },
                { cls: 'bar-firstpick', count: s.firstPick, tip: '1st Pick' },
                { cls: 'bar-secondban', count: s.secondBan, tip: '2nd Ban'  },
                { cls: 'bar-other',     count: s.other,     tip: 'Other'    },
            ];
            for (const seg of segs) {
                if (!seg.count) continue;
                const el = document.createElement('div');
                el.className = `bar-seg ${seg.cls}`;
                el.style.width = `${(seg.count / total * 100).toFixed(1)}%`;
                el.title = `${seg.tip}: ${seg.count}`;
                barWrap.appendChild(el);
            }
        } else {
            // Fallback: green = wins, background fill shows win rate
            if (s.played > 0) {
                const win = document.createElement('div');
                win.className = 'bar-seg bar-played';
                win.style.width = `${(s.wins / s.played * 100).toFixed(1)}%`;
                win.title = `Won ${s.wins} of ${s.played}`;
                barWrap.appendChild(win);
            }
        }

        const countEl = document.createElement('span');
        countEl.className = 'map-stat-count';
        countEl.textContent = total;
        countEl.title = hasVeto ? `${total} match${total !== 1 ? 'es' : ''}` : `${s.wins}W–${s.played - s.wins}L`;

        row.append(nameEl, barWrap, countEl);
        list.appendChild(row);
    }

    inner.appendChild(list);

    // Legend
    const legend = document.createElement('div');
    legend.className = 'map-legend';

    const legendDefs = hasVeto
        ? [
            { cls: 'bar-firstban',  label: '1st Ban'  },
            { cls: 'bar-firstpick', label: '1st Pick' },
            { cls: 'bar-secondban', label: '2nd Ban'  },
            { cls: 'bar-other',     label: 'Other'    },
          ]
        : [{ cls: 'bar-played', label: 'Win rate' }];

    for (const { cls, label } of legendDefs) {
        const item = document.createElement('div');
        item.className = 'legend-item';
        const dot = document.createElement('span');
        dot.className = `legend-dot ${cls}`;
        item.append(dot, document.createTextNode(label));
        legend.appendChild(item);
    }
    inner.appendChild(legend);

    if (!hasVeto) {
        const note = document.createElement('div');
        note.className = 'map-note';
        note.textContent = 'Veto data unavailable — re-run scraper to show pick/ban breakdown.';
        inner.appendChild(note);
    }
}

// ── Main render ───────────────────────────────────────────────────────────────

function renderTeam(team) {
    const r = REGIONS[team.region] || { label: team.region, rawColor: '#888', bg: 'rgba(136,136,136,0.13)' };

    document.title = `${team.name} — VCT 2026`;
    document.getElementById('pageTitle').textContent = team.name;

    const content = document.getElementById('content');
    content.innerHTML = '';

    // ── Hero ──────────────────────────────────────────────────────────────────
    const hero = document.createElement('div');
    hero.className = 'team-hero';
    hero.style.setProperty('--rc', r.rawColor);

    let logoEl;
    if (team.logo) {
        logoEl = document.createElement('img');
        logoEl.className = 'hero-logo';
        logoEl.src = team.logo;
        logoEl.alt = team.name;
        logoEl.onerror = function () {
            const ph = document.createElement('div');
            ph.className = 'hero-logo-ph';
            ph.textContent = team.name.slice(0, 2).toUpperCase();
            this.replaceWith(ph);
        };
    } else {
        logoEl = document.createElement('div');
        logoEl.className = 'hero-logo-ph';
        logoEl.textContent = team.name.slice(0, 2).toUpperCase();
    }

    const info = document.createElement('div');
    info.className = 'hero-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'hero-name';
    nameEl.textContent = team.name;

    const badge = document.createElement('span');
    badge.className = 'region-badge';
    badge.textContent = r.label;
    badge.style.cssText = `background:${r.bg};color:${r.rawColor}`;

    const recordRow = document.createElement('div');
    recordRow.className = 'hero-record';
    recordRow.appendChild(makeRecordItem('Match', team.matchW, team.matchL));
    recordRow.appendChild(makeRecordItem('Maps',  team.mapW,   team.mapL));

    info.append(nameEl, badge, recordRow);
    hero.append(logoEl, info);
    content.appendChild(hero);

    // ── Two-column grid ───────────────────────────────────────────────────────
    const grid = document.createElement('div');
    grid.className = 'page-grid';

    // Left: match history
    const leftCol = document.createElement('div');

    const histTitle = document.createElement('div');
    histTitle.className = 'section-title';
    histTitle.textContent = 'Match History';
    leftCol.appendChild(histTitle);

    const matches = team.matches || [];
    if (matches.length === 0) {
        const noHistory = document.createElement('div');
        noHistory.className = 'no-history';
        noHistory.innerHTML =
            'No match history available.<br>' +
            'Re-run <code>python scraper/scrape_vct.py</code> to collect match data.';
        leftCol.appendChild(noHistory);
    } else {
        const matchList = document.createElement('div');
        matchList.className = 'match-list';

        for (const m of matches) {
            const isWin = m.result === 'W';
            const [ms1, ms2] = m.matchScore || [0, 0];

            const card = document.createElement('div');
            card.className = 'match-card';
            card.style.setProperty('--mc', isWin ? 'var(--win)' : 'var(--loss)');

            const hdr = document.createElement('div');
            hdr.className = 'match-header';

            const resBadge = document.createElement('div');
            resBadge.className = `result-badge ${isWin ? 'win' : 'loss'}`;
            resBadge.textContent = m.result;

            const scoreBadge = document.createElement('div');
            scoreBadge.className = 'match-score';
            const swEl  = document.createElement('span'); swEl.className  = isWin ? 'w' : 'l'; swEl.textContent  = ms1;
            const ssep  = document.createElement('span'); ssep.className  = 'sep'; ssep.textContent  = '–';
            const slEl  = document.createElement('span'); slEl.className  = isWin ? 'l' : 'w'; slEl.textContent  = ms2;
            scoreBadge.append(swEl, ssep, slEl);

            const vsText = document.createElement('span');
            vsText.className = 'vs-text';
            vsText.textContent = 'vs';

            const oppEl = document.createElement('span');
            oppEl.className = 'match-opponent';
            oppEl.textContent = m.opponent;

            const eventEl = document.createElement('span');
            eventEl.className = 'match-event-label';
            eventEl.textContent = m.event || '';

            hdr.append(resBadge, scoreBadge, vsText, oppEl, eventEl);

            const maps = m.maps || [];
            if (maps.length > 0) {
                const mapsEl = document.createElement('div');
                mapsEl.className = 'match-maps';

                for (const mapData of maps) {
                    const [s1, s2] = mapData.score || [0, 0];
                    const mapWin = s1 > s2;

                    const mapRow = document.createElement('div');
                    mapRow.className = 'map-row';

                    const mapName = document.createElement('span');
                    mapName.className = 'map-name';
                    mapName.textContent = cleanMapName(mapData.map);

                    const mapScore = document.createElement('span');
                    mapScore.className = `map-score ${mapWin ? 'win' : 'loss'}`;
                    mapScore.textContent = `${s1} – ${s2}`;

                    mapRow.append(mapName, mapScore);
                    mapsEl.appendChild(mapRow);
                }

                card.append(hdr, mapsEl);
            } else {
                card.appendChild(hdr);
            }

            matchList.appendChild(card);
        }

        leftCol.appendChild(matchList);
    }

    // Right: map statistics
    const rightCol = document.createElement('div');
    renderMapStats(team, rightCol);

    grid.append(leftCol, rightCol);
    content.appendChild(grid);

    clearStatus();
}

function makeRecordItem(label, w, l) {
    const item = document.createElement('div');
    item.className = 'record-item';

    const lbl = document.createElement('div');
    lbl.className = 'record-label';
    lbl.textContent = label;

    const val = document.createElement('div');
    val.className = 'record-val';

    const wEl  = document.createElement('span'); wEl.className  = 'w'; wEl.textContent  = w;
    const sep  = document.createElement('span'); sep.className  = 'sep'; sep.textContent = '–';
    const lEl  = document.createElement('span'); lEl.className  = 'l'; lEl.textContent  = l;

    val.append(wEl, sep, lEl);
    item.append(lbl, val);
    return item;
}

init();
</script>
