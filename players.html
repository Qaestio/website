<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players — VCT 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; flex-direction: column; overflow: hidden; }

        .hidden { display: none !important; }

        /* ── Topbar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 52px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 1rem;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .topbar-title { font-weight: 600; font-size: 1rem; }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 0.75rem;
        }

        .sort-group {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .sbtn {
            background: none;
            border: none;
            padding: 0.45rem 0.9rem;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .sbtn + .sbtn            { border-left: 1px solid var(--border); }
        .sbtn.active             { background: var(--surface2); color: var(--text); }
        .sbtn:hover:not(.active) { color: var(--text); }

        /* ── Region filter chips ── */
        .filters {
            display: flex;
            gap: 0.4rem;
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            border: 1px solid transparent;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.15s;
        }
        .chip .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .chip.off   { opacity: 0.3; }

        /* ── Main scroll area ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem 2rem;
        }
        .main::-webkit-scrollbar       { width: 5px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        /* ── Player list ── */
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ── Column header ── */
        .list-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0 0.9rem 0.4rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .lh-rank  { width: 22px; flex-shrink: 0; }
        .lh-name  { flex: 1.2; min-width: 0; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
        .lh-team  { flex: 1.4; min-width: 0; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
        .lh-stats { display: flex; gap: 0.75rem; flex-shrink: 0; }
        .lh-stat  { width: 62px; text-align: center; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
        .lh-stat.sort-active { color: var(--text); }

        /* ── Player row ── */
        .player-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.55rem 0.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--rc, var(--border));
            border-radius: 8px;
            transition: background 0.1s;
        }
        .player-row:hover { background: var(--surface2); }

        .player-rank {
            font-size: 0.7rem;
            color: var(--dim);
            width: 22px;
            text-align: right;
            flex-shrink: 0;
        }

        .player-name-col {
            flex: 1.2;
            min-width: 0;
        }
        .player-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-team-col {
            flex: 1.4;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .team-logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 2px;
        }
        .team-logo-ph {
            width: 22px;
            height: 22px;
            background: var(--surface2);
            border-radius: 2px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            color: var(--dim);
        }
        .team-name-text {
            font-size: 0.82rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-stats {
            display: flex;
            gap: 0.75rem;
            flex-shrink: 0;
            align-items: center;
        }
        .stat-col {
            width: 62px;
            text-align: center;
        }
        .stat-val {
            font-size: 0.87rem;
            font-weight: 600;
        }
        .stat-val.sort-active { color: var(--text); }
        .stat-val.dim-val     { color: var(--muted); font-weight: 400; }

        /* ── Status ── */
        .status {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
            font-size: 0.88rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--muted);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .source-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--dim);
            margin-top: 1.5rem;
        }

        /* ── Search ── */
        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-icon { position: absolute; left: 0.55rem; color: var(--dim); font-size: 0.75rem; pointer-events: none; }
        .search-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.45rem 0.7rem 0.45rem 1.8rem;
            outline: none;
            width: 150px;
            transition: border-color 0.15s, width 0.2s;
        }
        .search-input::placeholder { color: var(--dim); }
        .search-input:focus { border-color: #444; width: 190px; }

        /* ── Sort direction button ── */
        .dir-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.45rem 0.65rem;
            line-height: 1;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .dir-btn:hover { background: #252525; color: var(--text); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .controls { height: auto; padding: 0.5rem 0.75rem; flex-wrap: wrap; }
            .player-rank { display: none; }
            .lh-rank     { display: none; }
            .player-team-col { display: none; }
            .lh-team         { display: none; }
            .stat-col  { width: 50px; }
            .lh-stat   { width: 50px; }
            .search-input { width: 110px; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-left">
        <a class="back-link" href="valorant.html">← Teams</a>
        <span class="topbar-title">VCT 2026 Players</span>
    </div>

</div>

<!-- Controls -->
<div class="controls">
    <div style="display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:0.78rem;color:var(--muted)">Sort:</span>
        <div class="sort-group">
            <button class="sbtn active" id="sVfl"     onclick="setSort('vfl')">VFL Pts</button>
            <button class="sbtn"        id="sRating"  onclick="setSort('rating')">VLR Rating</button>
            <button class="sbtn"        id="sKpm"     onclick="setSort('kpm')">K / Map</button>
            <button class="sbtn"        id="sCostPt"  onclick="setSort('costPt')">Cost / Pt</button>
        </div>
        <button class="dir-btn" id="dirBtn" onclick="toggleDir()" title="Toggle sort direction">↓</button>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Search players…"
                oninput="searchQuery=this.value;saveState();render()" autocomplete="off" spellcheck="false" />
        </div>
        <span id="playerCount" style="font-size:0.78rem;color:var(--dim)"></span>
    </div>
</div>

<!-- Region filter chips -->
<div class="filters" id="filters"></div>

<!-- Content -->
<div class="main">
    <div id="statusEl" class="status"><span class="spinner"></span> Loading players…</div>

    <div id="listHeader" class="list-header hidden">
        <div class="lh-rank"></div>
        <div class="lh-name">Player</div>
        <div class="lh-team">Team</div>
        <div class="lh-stats">
            <div class="lh-stat" id="hVfl"    title="VFL Pts/map: scored per map from actual match data. Includes kill pts, map win/loss, win margin, series bonuses, VLR rating rank &amp; threshold bonuses. Excludes multi-kill round bonuses (4K/5K/6K/7K — no per-round data available).">VFL Pts</div>
            <div class="lh-stat" id="hRating">VLR Rtg</div>
            <div class="lh-stat" id="hKpm">K / Map</div>
            <div class="lh-stat" id="hCostPt" title="Cost per VFL point (lower = better value). VFL price ÷ avg VFL pts/map from Kickoff + Santiago.">Cost / Pt</div>
        </div>
    </div>

    <div id="playerList" class="player-list hidden"></div>

    <div id="sourceNote" class="source-note hidden">
        Data scraped from <a href="https://vlr.gg" target="_blank" rel="noopener"
            style="color:var(--muted);text-decoration:none">vlr.gg</a>
        · <span id="dataMode"></span>
    </div>
</div>

<script>
const REGIONS = {
    americas: { label: 'Americas', color: 'var(--americas-c)', rawColor: '#f0923b', bg: 'var(--americas-bg)' },
    emea:     { label: 'EMEA',     color: 'var(--emea-c)',     rawColor: '#f0c040', bg: 'var(--emea-bg)'     },
    pacific:  { label: 'Pacific',  color: 'var(--pacific-c)',  rawColor: '#5b9cf6', bg: 'var(--pacific-bg)'  },
    china:    { label: 'China',    color: 'var(--china-c)',    rawColor: '#e05252', bg: 'var(--china-bg)'    },
};

let allPlayers  = [];
let activeReg   = new Set(Object.keys(REGIONS));
let sortMode    = 'vfl';
let sortDir     = 'desc'; // 'desc' | 'asc'
let searchQuery = '';
let rowMap      = new Map(); // player index → DOM row

// ── Session persistence ───────────────────────────────────────────────────────

function saveState() {
    sessionStorage.setItem('pl_sort',    sortMode);
    sessionStorage.setItem('pl_dir',     sortDir);
    sessionStorage.setItem('pl_regions', JSON.stringify([...activeReg]));
    sessionStorage.setItem('pl_search',  searchQuery);
}

function restoreState() {
    const sort = sessionStorage.getItem('pl_sort');
    if (sort && ['vfl','rating','kpm','costPt'].includes(sort)) sortMode = sort;

    const dir = sessionStorage.getItem('pl_dir');
    if (dir === 'asc' || dir === 'desc') sortDir = dir;

    const regs = sessionStorage.getItem('pl_regions');
    if (regs) {
        try {
            const arr = JSON.parse(regs);
            if (Array.isArray(arr) && arr.length > 0) activeReg = new Set(arr);
        } catch (_) {}
    }

    const q = sessionStorage.getItem('pl_search');
    if (q) {
        searchQuery = q;
        const input = document.getElementById('searchInput');
        if (input) input.value = q;
    }

    ['sVfl','sRating','sKpm','sCostPt'].forEach(id => {
        const mode = { sVfl:'vfl', sRating:'rating', sKpm:'kpm', sCostPt:'costPt' }[id];
        document.getElementById(id).classList.toggle('active', mode === sortMode);
    });
    document.getElementById('dirBtn').textContent = sortDir === 'asc' ? '↑' : '↓';
}

// ── VFL price fetch (with 5 s timeout) ───────────────────────────────────────

const VFL_EVENT_ID = 8;

async function fetchVflPrices() {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 5000);
    try {
        const r = await fetch(
            `https://api.valorantfantasyleague.net/api/Player/allplayers?eventId=${VFL_EVENT_ID}`,
            { cache: 'no-cache', signal: controller.signal }
        );
        clearTimeout(timer);
        if (!r.ok) return new Map();
        const players = await r.json();
        const map = new Map();
        for (const p of players) {
            const key = p.player?.name?.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (key) map.set(key, p.price);
        }
        return map;
    } catch {
        clearTimeout(timer);
        return new Map();
    }
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
    setStatus('<span class="spinner"></span> Loading players…');
    document.getElementById('playerList').classList.add('hidden');
    document.getElementById('listHeader').classList.add('hidden');
    document.getElementById('sourceNote').classList.add('hidden');
    allPlayers = [];
    rowMap.clear();

    // Fetch VCT data first; VFL prices load in parallel but failures are silent
    let data;
    try {
        const r = await fetch('./vct_data.json', { cache: 'no-cache' });
        if (!r.ok) throw new Error();
        data = await r.json();
    } catch (_) {
        setStatus(`<div style="color:#e05252">
            Could not load <code style="font-size:0.85em">vct_data.json</code>.<br>
            Run <code style="font-size:0.85em">python scraper/scrape_vct.py</code> to generate it, then refresh.
        </div>`);
        return;
    }

    if (!Array.isArray(data?.teams) || data.teams.length < 10) {
        setStatus('<div style="color:#e05252">Data file is empty or invalid.</div>');
        return;
    }

    // VFL prices are best-effort — don't block render if the API is slow/down
    const vflPrices = await fetchVflPrices();

    for (const team of data.teams) {
        if (!Array.isArray(team.players)) continue;
        for (const p of team.players) {
            const vflKey = p.name?.toLowerCase().replace(/[^a-z0-9]/g, '');
            const price  = vflPrices.get(vflKey) ?? null;
            const vflPts = p.vflPts ?? null;
            allPlayers.push({
                name:   p.name,
                rating: p.rating ?? null,
                kpm:    p.kpm    ?? null,
                vfl:    vflPts,
                costPt: price != null && vflPts > 0 ? price / vflPts : null,
                team:   team.name,
                region: team.region,
                logo:   team.logo || '',
            });
        }
    }

    let updatedStr = '';
    if (data.lastUpdated) {
        try {
            const d = new Date(data.lastUpdated);
            updatedStr = ` · updated ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
        } catch (_) {}
    }
    document.getElementById('dataMode').innerHTML = `player stats${updatedStr}`;
    document.getElementById('sourceNote').classList.remove('hidden');

    buildFilters();
    buildAllRows();
    render();
    clearStatus();
}

// ── Filters ───────────────────────────────────────────────────────────────────

function buildFilters() {
    const cont = document.getElementById('filters');
    cont.innerHTML = '';
    Object.entries(REGIONS).forEach(([k, r]) => {
        const on   = activeReg.has(k);
        const chip = document.createElement('div');
        chip.className = `chip${on ? '' : ' off'}`;
        chip.style.cssText = on
            ? `background:${r.bg};border-color:${r.rawColor}44;color:${r.rawColor}`
            : `background:transparent;border-color:var(--border);color:var(--muted)`;
        const dot = document.createElement('span');
        dot.className = 'cdot';
        dot.style.background = r.rawColor;
        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(r.label));
        chip.addEventListener('click', () => {
            if (activeReg.has(k) && activeReg.size > 1) activeReg.delete(k);
            else activeReg.add(k);
            buildFilters();
            saveState();
            render();
        });
        cont.appendChild(chip);
    });
}

// ── Sort ──────────────────────────────────────────────────────────────────────

function setSort(mode) {
    sortMode = mode;
    document.getElementById('sVfl').classList.toggle('active',    mode === 'vfl');
    document.getElementById('sRating').classList.toggle('active', mode === 'rating');
    document.getElementById('sKpm').classList.toggle('active',    mode === 'kpm');
    document.getElementById('sCostPt').classList.toggle('active', mode === 'costPt');
    saveState();
    render();
}

function toggleDir() {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    document.getElementById('dirBtn').textContent = sortDir === 'asc' ? '↑' : '↓';
    saveState();
    render();
}

function sortedPlayers() {
    const visible = allPlayers.filter(p => activeReg.has(p.region));
    const key = sortMode === 'rating' ? 'rating'
              : sortMode === 'kpm'    ? 'kpm'
              : sortMode === 'costPt' ? 'costPt'
              : 'vfl';
    // Default natural direction: costPt asc (lower = better), all others desc
    const naturalAsc = sortMode === 'costPt';
    const ascending  = naturalAsc ? sortDir === 'desc' : sortDir === 'asc';
    return [...visible].sort((a, b) =>
        ascending
            ? (a[key] ?? Infinity)  - (b[key] ?? Infinity)
            : (b[key] ?? -Infinity) - (a[key] ?? -Infinity)
    );
}

// ── Build rows once ───────────────────────────────────────────────────────────

function buildAllRows() {
    const list = document.getElementById('playerList');
    list.innerHTML = '';
    rowMap.clear();

    allPlayers.forEach((p, idx) => {
        const r = REGIONS[p.region];

        const row = document.createElement('div');
        row.className = 'player-row';
        row.style.setProperty('--rc', r.rawColor);
        row.dataset.idx = idx;

        const rank = document.createElement('span');
        rank.className = 'player-rank';

        const nameCol = document.createElement('div');
        nameCol.className = 'player-name-col';
        const nameEl = document.createElement('div');
        nameEl.className = 'player-name';
        nameEl.textContent = p.name;
        nameCol.appendChild(nameEl);

        const teamCol = document.createElement('div');
        teamCol.className = 'player-team-col';
        let logoEl;
        if (p.logo) {
            logoEl = document.createElement('img');
            logoEl.className = 'team-logo';
            logoEl.src = p.logo;
            logoEl.alt = p.team;
            logoEl.loading = 'lazy';
            logoEl.onerror = function () {
                const ph = document.createElement('div');
                ph.className = 'team-logo-ph';
                ph.textContent = p.team.slice(0, 2).toUpperCase();
                this.replaceWith(ph);
            };
        } else {
            logoEl = document.createElement('div');
            logoEl.className = 'team-logo-ph';
            logoEl.textContent = p.team.slice(0, 2).toUpperCase();
        }
        const teamName = document.createElement('span');
        teamName.className = 'team-name-text';
        teamName.textContent = p.team;
        teamCol.append(logoEl, teamName);

        const stats = document.createElement('div');
        stats.className = 'player-stats';
        stats.appendChild(makeStatVal(p.vfl,    'vfl',    1));
        stats.appendChild(makeStatVal(p.rating, 'rating', 2));
        stats.appendChild(makeStatVal(p.kpm,    'kpm',    1));
        stats.appendChild(makeStatVal(p.costPt, 'costPt', 2));

        row.append(rank, nameCol, teamCol, stats);
        list.appendChild(row);
        rowMap.set(idx, row);
    });
}

// ── Render — update order + visibility only ───────────────────────────────────

function render() {
    const list   = document.getElementById('playerList');
    const header = document.getElementById('listHeader');

    if (rowMap.size === 0) return;

    const query  = searchQuery.trim().toLowerCase();
    const sorted = sortedPlayers();
    const sortedIdxs = new Set(sorted.map((_, i) => allPlayers.indexOf(sorted[i])));

    // Assign order
    sorted.forEach((p, i) => {
        const idx = allPlayers.indexOf(p);
        const row = rowMap.get(idx);
        if (row) row.style.order = i;
    });

    // Visibility
    allPlayers.forEach((p, idx) => {
        const row = rowMap.get(idx);
        if (!row) return;
        const inRegion   = activeReg.has(p.region);
        const passSearch = !query ||
            p.name.toLowerCase().includes(query) ||
            p.team.toLowerCase().includes(query);
        row.classList.toggle('hidden', !inRegion || !passSearch);
    });

    // Update sort-active highlight on stat cells
    document.getElementById('hVfl').classList.toggle('sort-active',    sortMode === 'vfl');
    document.getElementById('hRating').classList.toggle('sort-active', sortMode === 'rating');
    document.getElementById('hKpm').classList.toggle('sort-active',    sortMode === 'kpm');
    document.getElementById('hCostPt').classList.toggle('sort-active', sortMode === 'costPt');

    // Update stat cell highlights and rank numbers
    let rank = 1;
    sorted.forEach(p => {
        const idx = allPlayers.indexOf(p);
        const row = rowMap.get(idx);
        if (!row) return;

        // Rank
        const rankEl = row.querySelector('.player-rank');
        if (rankEl) {
            if (row.classList.contains('hidden')) {
                rankEl.textContent = '';
            } else {
                rankEl.textContent = `${rank}`;
                rank++;
            }
        }

        // Stat cell active highlight
        const statCells = row.querySelectorAll('.stat-val');
        const modes = ['vfl','rating','kpm','costPt'];
        statCells.forEach((cell, i) => {
            cell.classList.toggle('sort-active', modes[i] === sortMode);
        });
    });

    const visibleCount = [...rowMap.values()].filter(r => !r.classList.contains('hidden')).length;
    document.getElementById('playerCount').textContent =
        `${visibleCount} player${visibleCount !== 1 ? 's' : ''}`;

    const noRes = list.querySelector('.no-results');
    if (visibleCount === 0 && allPlayers.length > 0) {
        header.classList.add('hidden');
        if (!noRes) {
            const msg = document.createElement('div');
            msg.className = 'no-results';
            msg.style.cssText = 'text-align:center;padding:3rem;color:var(--muted)';
            msg.textContent = 'No players match your search.';
            list.appendChild(msg);
        }
    } else {
        header.classList.remove('hidden');
        if (noRes) noRes.remove();
    }

    list.classList.remove('hidden');
}

function makeStatVal(value, mode, decimals) {
    const col = document.createElement('div');
    col.className = 'stat-col';
    const val = document.createElement('div');
    if (value != null) {
        val.className = `stat-val${mode === sortMode ? ' sort-active' : ''}`;
        val.textContent = decimals === 0 ? Math.round(value) : value.toFixed(decimals);
    } else {
        val.className = 'stat-val dim-val';
        val.textContent = '–';
    }
    col.appendChild(val);
    return col;
}

// ── Status helpers ────────────────────────────────────────────────────────────

function setStatus(html) {
    const el = document.getElementById('statusEl');
    el.innerHTML = html;
    el.classList.remove('hidden');
}

function clearStatus() {
    document.getElementById('statusEl').classList.add('hidden');
}

// ── Init ──────────────────────────────────────────────────────────────────────

restoreState();
buildFilters();
loadData();
</script>
</body>
</html>
