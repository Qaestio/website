<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFL Transfer Optimizer — VCT 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        body { display: flex; flex-direction: column; }

        /* ── Topbar ── */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.25rem; height: 52px;
            border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 1rem;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .back-link {
            color: var(--muted); text-decoration: none;
            font-size: 0.85rem; transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .topbar-title { font-weight: 600; font-size: 1rem; }

        /* ── Main scroll ── */
        .main {
            flex: 1; overflow-y: auto;
            padding: 1.5rem 1.25rem 3rem;
        }
        .main::-webkit-scrollbar       { width: 5px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        .inner { max-width: 1060px; margin: 0 auto; }

        /* ── Status / loading ── */
        .status-area {
            text-align: center; padding: 4rem 1rem;
            color: var(--muted); font-size: 0.9rem;
        }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--muted);
            border-radius: 50%; animation: spin 0.75s linear infinite;
            vertical-align: middle; margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-text { color: #e05252; }

        /* ── Selection header ── */
        .sel-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .sel-title { font-size: 1rem; font-weight: 600; }
        .sel-actions { display: flex; align-items: center; gap: 0.75rem; }
        .sel-count-badge {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.35rem 0.75rem;
            font-size: 0.85rem; font-weight: 600; color: var(--muted);
            white-space: nowrap;
        }
        .sel-count-badge.complete { color: #7dc87d; border-color: #7dc87d44; }

        .suggest-btn {
            background: #2a4a2a; border: 1px solid #3a6a3a;
            border-radius: 6px; color: #7dc87d; cursor: pointer;
            font-size: 0.85rem; font-family: inherit; font-weight: 600;
            padding: 0.45rem 1rem; transition: all 0.15s;
            white-space: nowrap;
        }
        .suggest-btn:hover:not(:disabled) { background: #325a32; border-color: #4a7a4a; }
        .suggest-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── Filter row ── */
        .filter-row {
            display: flex; align-items: center; gap: 0.75rem;
            flex-wrap: wrap; margin-bottom: 0.9rem;
        }
        .search-box {
            flex: 1; min-width: 160px; max-width: 300px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-family: inherit;
            font-size: 0.85rem; padding: 0.42rem 0.75rem; outline: none;
        }
        .search-box:focus { border-color: #444; }
        .region-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .rf-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 5px; color: var(--muted); cursor: pointer;
            font-size: 0.75rem; font-family: inherit; font-weight: 600;
            padding: 0.3rem 0.7rem; transition: all 0.15s;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .rf-btn:hover { color: var(--text); border-color: #444; }
        .rf-btn.active { color: #fff; background: #333; border-color: #555; }
        .rf-btn[data-region="americas"].active { color: #f0923b; border-color: #f0923b55; background: rgba(240,146,59,0.1); }

        /* ── Selection layout ── */
        .sel-layout {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 1rem;
            align-items: start;
        }
        @media (max-width: 700px) {
            .sel-layout { grid-template-columns: 1fr; }
        }

        /* ── Pool grid ── */
        .pool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.5rem;
        }

        /* ── Pool card ── */
        .pool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--role-color, var(--border));
            border-radius: 7px;
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            user-select: none;
            position: relative;
        }
        .pool-card:hover { border-color: #444; background: var(--surface2); }
        .pool-card.selected {
            background: rgba(125,200,125,0.08);
            border-color: #7dc87d55 !important;
        }
        .pool-card.selected .pc-name::after {
            content: ' ✓';
            color: #7dc87d;
            font-size: 0.8em;
        }
        .pool-card.maxed:not(.selected) { opacity: 0.4; cursor: not-allowed; }

        .pc-top {
            display: flex; align-items: center;
            justify-content: space-between; gap: 0.4rem;
            margin-bottom: 0.25rem;
        }
        .pc-badge {
            font-size: 0.58rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.07em;
            padding: 0.1rem 0.4rem; border-radius: 3px;
            background: var(--role-bg, #1e1e1e);
            color: var(--role-color, var(--muted));
            flex-shrink: 0;
        }
        .pc-region {
            font-size: 0.58rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0.1rem 0.4rem; border-radius: 3px;
            flex-shrink: 0;
        }
        .pc-region.americas { background: rgba(240,146,59,0.15); color: #f0923b; }
        .pc-region.pacific  { background: rgba(91,156,246,0.12); color: #5b9cf6; }
        .pc-region.emea     { background: rgba(166,124,209,0.12); color: #a67cd1; }
        .pc-pts { font-size: 0.75rem; font-weight: 600; color: #7dc87d; }

        .pc-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .pc-team {
            display: flex; align-items: center; gap: 0.35rem;
            font-size: 0.75rem; color: var(--muted);
        }
        .pc-logo {
            width: 16px; height: 16px; object-fit: contain;
            border-radius: 2px; flex-shrink: 0;
        }
        .pc-logo-ph {
            width: 16px; height: 16px;
            background: var(--surface2); border-radius: 2px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.48rem; color: var(--dim);
        }
        .pc-bottom {
            display: flex; justify-content: flex-end;
            margin-top: 0.15rem;
        }
        .pc-price { font-size: 0.72rem; color: var(--dim); }
        .pc-price span { color: var(--muted); font-weight: 600; }

        /* ── Team sidebar ── */
        .team-sidebar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.85rem;
            position: sticky; top: 0;
        }
        .sidebar-heading {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--dim); margin-bottom: 0.65rem;
        }
        .team-list { display: flex; flex-direction: column; gap: 0.35rem; }
        .team-list-item {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.35rem 0.5rem;
            background: var(--surface2); border-radius: 5px;
            font-size: 0.8rem;
        }
        .tli-role {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .tli-name { flex: 1; font-weight: 600; }
        .tli-team { color: var(--dim); font-size: 0.72rem; }
        .tli-remove {
            color: var(--dim); cursor: pointer; font-size: 0.85rem;
            line-height: 1; padding: 0.1rem; margin-left: auto;
            transition: color 0.1s;
        }
        .tli-remove:hover { color: #e05252; }
        .sidebar-budget {
            margin-top: 0.75rem; padding-top: 0.6rem;
            border-top: 1px solid var(--border);
            font-size: 0.78rem; color: var(--muted);
            display: flex; flex-direction: column; gap: 0.2rem;
        }
        .sb-row { display: flex; justify-content: space-between; }
        .sb-val { font-weight: 600; }
        .sb-val.ok  { color: #7dc87d; }
        .sb-val.warn { color: #e05252; }
        .team-slot-empty {
            display: flex; align-items: center;
            padding: 0.35rem 0.5rem;
            background: var(--surface2); border-radius: 5px;
            border: 1px dashed var(--border);
            font-size: 0.75rem; color: var(--dim);
        }

        /* ── Back button ── */
        .back-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 6px; color: var(--muted); cursor: pointer;
            font-size: 0.82rem; font-family: inherit;
            padding: 0.4rem 0.8rem; margin-bottom: 1rem;
            transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .back-btn:hover { color: var(--text); border-color: #444; }

        /* ── Transfer summary bar ── */
        .transfer-summary {
            display: flex; gap: 1.5rem; flex-wrap: wrap;
            align-items: center;
            padding: 0.9rem 1.1rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 1.25rem;
        }
        .ts-item { display: flex; flex-direction: column; gap: 0.12rem; }
        .ts-label {
            font-size: 0.68rem; color: var(--dim);
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .ts-val { font-size: 1.05rem; font-weight: 700; }
        .ts-val.gain-pos { color: #7dc87d; }
        .ts-val.gain-neg { color: #e05252; }
        .ts-val.budget-ok { color: #7dc87d; }
        .ts-val.budget-warn { color: #e05252; }

        /* ── In/Out grid ── */
        .inout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 600px) {
            .inout-grid { grid-template-columns: 1fr; }
        }
        .inout-heading {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.07em;
            margin-bottom: 0.5rem;
        }
        .out-heading { color: #e05252; }
        .in-heading  { color: #7dc87d; }

        /* ── Player grid / card (results) ── */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.65rem;
        }
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--role-color, var(--border));
            border-radius: 8px;
            padding: 0.75rem 0.9rem;
            display: flex; flex-direction: column; gap: 0.35rem;
        }
        .player-card.card-out { border-color: #e0525244 !important; background: rgba(224,82,82,0.04); }
        .player-card.card-in  { border-color: #7dc87d44 !important; background: rgba(125,200,125,0.05); }

        .card-top {
            display: flex; align-items: center;
            justify-content: space-between; gap: 0.5rem;
        }
        .card-badges { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
        .role-badge {
            font-size: 0.58rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.07em;
            padding: 0.12rem 0.45rem; border-radius: 3px;
            background: var(--role-bg, #1e1e1e);
            color: var(--role-color, var(--muted));
        }
        .region-badge {
            font-size: 0.58rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0.12rem 0.45rem; border-radius: 3px;
        }
        .region-badge.americas { background: rgba(240,146,59,0.15); color: #f0923b; }
        .region-badge.pacific  { background: rgba(91,156,246,0.12); color: #5b9cf6; }
        .region-badge.emea     { background: rgba(166,124,209,0.12); color: #a67cd1; }
        .card-pts { font-size: 0.8rem; font-weight: 600; color: #7dc87d; flex-shrink: 0; }

        .card-name { font-weight: 700; font-size: 0.95rem; }
        .card-team { display: flex; align-items: center; gap: 0.4rem; }
        .team-logo {
            width: 18px; height: 18px; object-fit: contain;
            border-radius: 2px; flex-shrink: 0;
        }
        .team-logo-ph {
            width: 18px; height: 18px;
            background: var(--surface2); border-radius: 2px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.5rem; color: var(--dim);
        }
        .team-name-text { font-size: 0.78rem; color: var(--muted); }
        .card-price { font-size: 0.75rem; color: var(--dim); }
        .card-price span { color: var(--muted); font-weight: 600; }

        /* ── Section heading ── */
        .section-heading {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--dim); margin: 1.1rem 0 0.5rem;
        }

        /* ── Meta note ── */
        .meta-note {
            font-size: 0.7rem; color: var(--dim);
            margin-top: 1.25rem; text-align: center;
        }

        /* ── Hidden ── */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-left">
        <a class="back-link" href="players.html">← Players</a>
        <span class="topbar-title">VFL Transfer Optimizer</span>
    </div>
</div>

<!-- Main content -->
<div class="main">
    <div class="inner">

        <!-- Status / loading -->
        <div id="statusArea" class="status-area">
            <span class="spinner"></span> Loading player data…
        </div>

        <!-- Phase 1: Selection -->
        <div id="selectionPhase" class="hidden">

            <div class="sel-header">
                <div class="sel-title">Select Your Current Team</div>
                <div class="sel-actions">
                    <span class="sel-count-badge" id="selCountBadge">0 / 11</span>
                    <button class="suggest-btn" id="suggestBtn" onclick="runTransferOptimizer()" disabled>
                        Suggest Transfers →
                    </button>
                </div>
            </div>

            <div class="filter-row">
                <input type="text" id="searchBox" class="search-box" placeholder="Search players…" oninput="filterPool()">
                <div class="region-filters">
                    <button class="rf-btn active" data-region="all" onclick="setRegionFilter('all', this)">All</button>
                    <button class="rf-btn" data-region="pacific" onclick="setRegionFilter('pacific', this)">Pacific</button>
                    <button class="rf-btn" data-region="emea" onclick="setRegionFilter('emea', this)">EMEA</button>
                    <button class="rf-btn" data-region="americas" onclick="setRegionFilter('americas', this)">Americas</button>
                </div>
            </div>

            <div class="sel-layout">
                <div class="pool-panel">
                    <div id="poolGrid" class="pool-grid"></div>
                </div>
                <div class="team-sidebar">
                    <div class="sidebar-heading">Your Team</div>
                    <div id="teamList" class="team-list"></div>
                    <div class="sidebar-budget" id="sidebarBudget"></div>
                </div>
            </div>
        </div>

        <!-- Phase 2: Transfer Results -->
        <div id="resultsPhase" class="hidden">

            <button class="back-btn" onclick="showSelectionPhase()">← Adjust Team</button>

            <div class="transfer-summary" id="transferSummary">
                <div class="ts-item">
                    <span class="ts-label">Pts before</span>
                    <span class="ts-val" id="tsPtsBefore">–</span>
                </div>
                <div class="ts-item">
                    <span class="ts-label">Pts after</span>
                    <span class="ts-val" id="tsPtsAfter">–</span>
                </div>
                <div class="ts-item">
                    <span class="ts-label">Projected gain</span>
                    <span class="ts-val" id="tsPtsGain">–</span>
                </div>
                <div class="ts-item">
                    <span class="ts-label">Budget remaining</span>
                    <span class="ts-val" id="tsBudget">–</span>
                </div>
                <div class="ts-item">
                    <span class="ts-label">Americas players</span>
                    <span class="ts-val" id="tsAmericasCount">–</span>
                </div>
            </div>

            <div class="inout-grid">
                <div>
                    <div class="inout-heading out-heading">Transfer Out</div>
                    <div id="dropGrid" class="player-grid"></div>
                </div>
                <div>
                    <div class="inout-heading in-heading">Transfer In</div>
                    <div id="addGrid" class="player-grid"></div>
                </div>
            </div>

            <div class="section-heading">Full Team After Transfers</div>
            <div id="fullTeamGrid" class="player-grid"></div>

            <div id="metaNote" class="meta-note"></div>

        </div>

    </div>
</div>

// ── Constants ─────────────────────────────────────────────────────────────────
const BUDGET       = 100;
const MAX_PER_TEAM = 2;
const VFL_EVENT_ID = 8;

// ── Helpers ───────────────────────────────────────────────────────────────────
function normName(s) {
    return s.toLowerCase().replace(/[^a-z0-9]/g, '');
}

function setStatus(html) {
    document.getElementById('statusArea').innerHTML = html;
    document.getElementById('statusArea').classList.remove('hidden');
    document.getElementById('selectionPhase').classList.add('hidden');
    document.getElementById('resultsPhase').classList.add('hidden');
}

// ── VFL price fetch ───────────────────────────────────────────────────────────
async function fetchVflPrices() {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 5000);
    try {
        const r = await fetch(
            `https://api.valorantfantasyleague.net/api/Player/allplayers?eventId=${VFL_EVENT_ID}`,
            { cache: 'no-cache', signal: controller.signal }
        );
        clearTimeout(timer);
        if (!r.ok) return new Map();
        const list = await r.json();
        const map = new Map();
        for (const p of list) {
            const key = normName(p.player?.name ?? '');
            if (key) map.set(key, p.price);
        }
        return map;
    } catch {
        clearTimeout(timer);
        return new Map();
    }
}

// ── Transfer solver ───────────────────────────────────────────────────────────
//
// Tries all C(11,3) = 165 drop combinations. For each, finds the best 3
// additions from the remaining pool where ≥2 are Americas players.
// Maximises total team VFL pts, respecting the 100 VP budget cap and
// max-2-per-team rule.

function getRequiredSlots(kept) {
    // Given 8 kept players, compute the 3 slot types the additions must fill.
    const cnt = { duelist: 0, controller: 0, initiator: 0, sentinel: 0 };
    for (const p of kept) cnt[p.role]++;

    const D_rem = Math.max(0, 2 - cnt.duelist);
    const C_rem = Math.max(0, 2 - cnt.controller);
    const I_rem = Math.max(0, 2 - cnt.initiator);
    const S_rem = Math.max(0, 2 - cnt.sentinel);
    // Players beyond 2 per role spill into wildcard slots
    const excess = Math.max(0, cnt.duelist - 2) + Math.max(0, cnt.controller - 2) +
                   Math.max(0, cnt.initiator - 2) + Math.max(0, cnt.sentinel - 2);
    const WC_rem = 3 - excess;

    const slots = [];
    for (let i = 0; i < D_rem;  i++) slots.push('duelist');
    for (let i = 0; i < C_rem;  i++) slots.push('controller');
    for (let i = 0; i < I_rem;  i++) slots.push('initiator');
    for (let i = 0; i < S_rem;  i++) slots.push('sentinel');
    for (let i = 0; i < WC_rem; i++) slots.push('wildcard');
    return slots; // always length 3
}

// Check if 3 players can be assigned to 3 slots (any permutation)
const PERMS3 = [[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
function canFillSlots(pa, pb, pc, slots) {
    const ps = [pa, pb, pc];
    for (const perm of PERMS3) {
        if (slots.every((slot, i) =>
            slot === 'wildcard' || slot === ps[perm[i]].role
        )) return true;
    }
    return false;
}

function findBestAdditions(pool, kept, slots) {
    const budgetLeft = BUDGET - kept.reduce((s, p) => s + p.price, 0);
    const teamCounts = {};
    for (const p of kept) teamCounts[p.team] = (teamCounts[p.team] || 0) + 1;

    let bestPts = -Infinity;
    let bestAdd = null;
    const n = pool.length;

    for (let a = 0; a < n; a++) {
        const pa = pool[a];
        if ((teamCounts[pa.team] || 0) >= MAX_PER_TEAM) continue;
        if (pa.price > budgetLeft) continue;

        for (let b = a + 1; b < n; b++) {
            const pb = pool[b];
            // Team cap for b (accounting for a)
            const tcB = (teamCounts[pb.team] || 0) + (pb.team === pa.team ? 1 : 0);
            if (tcB >= MAX_PER_TEAM) continue;
            if (pa.price + pb.price > budgetLeft) continue;

            for (let c = b + 1; c < n; c++) {
                const pc = pool[c];
                // Team cap for c (accounting for a + b)
                const tcC = (teamCounts[pc.team] || 0) +
                            (pc.team === pa.team ? 1 : 0) +
                            (pc.team === pb.team ? 1 : 0);
                if (tcC >= MAX_PER_TEAM) continue;
                if (pa.price + pb.price + pc.price > budgetLeft) continue;

                // Americas constraint: ≥2 of 3 must be Americas
                const amCount = (pa.region === 'americas' ? 1 : 0) +
                                (pb.region === 'americas' ? 1 : 0) +
                                (pc.region === 'americas' ? 1 : 0);
                if (amCount < 2) continue;

                // Role slot compatibility
                if (!canFillSlots(pa, pb, pc, slots)) continue;

                const pts = pa.pts + pb.pts + pc.pts;
                if (pts > bestPts) {
                    bestPts = pts;
                    bestAdd = [pa, pb, pc];
                }
            }
        }
    }

    return bestAdd ? { players: bestAdd, pts: bestPts } : null;
}

function solveTransfers(currentTeam, pool) {
    let best = null;
    let bestNewPts = -Infinity;

    for (let i = 0; i < 11; i++) {
        for (let j = i + 1; j < 11; j++) {
            for (let k = j + 1; k < 11; k++) {
                const drop = [currentTeam[i], currentTeam[j], currentTeam[k]];
                const kept = currentTeam.filter((_, idx) => idx !== i && idx !== j && idx !== k);
                const slots = getRequiredSlots(kept);
                const keptPts = kept.reduce((s, p) => s + p.pts, 0);

                const addResult = findBestAdditions(pool, kept, slots);
                if (!addResult) continue;

                const newPts = keptPts + addResult.pts;
                if (newPts > bestNewPts) {
                    bestNewPts = newPts;
                    best = { drop, add: addResult.players, kept, newPts };
                }
            }
        }
    }

    return best;
}

// ── Pool rendering ────────────────────────────────────────────────────────────
function makeLogoEl(team, small = false) {
    const size = small ? 16 : 18;
    const logo = teamLogoMap.get(team);
    if (logo) {
        const img = document.createElement('img');
        img.className = small ? 'pc-logo' : 'team-logo';
        img.src   = logo; img.alt = team; img.loading = 'lazy';
        img.onerror = function () {
            const ph = document.createElement('div');
            ph.className   = small ? 'pc-logo-ph' : 'team-logo-ph';
            ph.textContent = team.slice(0, 2).toUpperCase();
            this.replaceWith(ph);
        };
        return img;
    }
    const ph = document.createElement('div');
    ph.className   = small ? 'pc-logo-ph' : 'team-logo-ph';
    ph.textContent = team.slice(0, 2).toUpperCase();
    return ph;
}

function renderPool() {
    const grid = document.getElementById('poolGrid');
    grid.innerHTML = '';
    const maxed = currentTeam.length >= 11;
    const selectedNames = new Set(currentTeam.map(p => p.name));
    const term = searchTerm.toLowerCase();

    const visible = allPlayers.filter(p => {
        if (activeRegion !== 'all' && p.region !== activeRegion) return false;
        if (term && !p.name.toLowerCase().includes(term) && !p.team.toLowerCase().includes(term)) return false;
        return true;
    });

    for (const p of visible) {
        const isSelected = selectedNames.has(p.name);
        const rs = ROLE_STYLE[p.role] || ROLE_STYLE.wildcard;

        const card = document.createElement('div');
        card.className = 'pool-card' +
            (isSelected ? ' selected' : '') +
            (!isSelected && maxed ? ' maxed' : '');
        card.style.setProperty('--role-color', rs.color);
        card.style.setProperty('--role-bg',    rs.bg);
        if (!maxed || isSelected) card.onclick = () => togglePlayer(p);

        // Top row
        const top = document.createElement('div');
        top.className = 'pc-top';

        const badges = document.createElement('div');
        badges.style.cssText = 'display:flex;gap:0.3rem;align-items:center;flex-wrap:wrap';

        const roleBadge = document.createElement('span');
        roleBadge.className   = 'pc-badge';
        roleBadge.textContent = p.role;
        badges.appendChild(roleBadge);

        const regionBadge = document.createElement('span');
        regionBadge.className   = `pc-region ${p.region}`;
        regionBadge.textContent = p.region === 'americas' ? 'AME' : p.region === 'pacific' ? 'PAC' : 'EMEA';
        badges.appendChild(regionBadge);

        const ptsEl = document.createElement('span');
        ptsEl.className   = 'pc-pts';
        ptsEl.textContent = `${p.pts.toFixed(2)} pts`;

        top.append(badges, ptsEl);

        const nameEl = document.createElement('div');
        nameEl.className   = 'pc-name';
        nameEl.textContent = p.name;

        const teamRow = document.createElement('div');
        teamRow.className = 'pc-team';
        teamRow.append(makeLogoEl(p.team, true));
        const tn = document.createElement('span');
        tn.textContent = p.team;
        teamRow.appendChild(tn);

        const bottom = document.createElement('div');
        bottom.className = 'pc-bottom';
        const priceEl = document.createElement('div');
        priceEl.className = 'pc-price';
        priceEl.innerHTML = `Price: <span>${p.price} VP</span>`;
        bottom.appendChild(priceEl);

        card.append(top, nameEl, teamRow, bottom);
        grid.appendChild(card);
    }
}

function renderTeamSidebar() {
    const list = document.getElementById('teamList');
    list.innerHTML = '';

    for (let i = 0; i < 11; i++) {
        const p = currentTeam[i];
        if (!p) {
            const empty = document.createElement('div');
            empty.className   = 'team-slot-empty';
            empty.textContent = `Slot ${i + 1}`;
            list.appendChild(empty);
            continue;
        }

        const rs = ROLE_STYLE[p.role] || ROLE_STYLE.wildcard;
        const item = document.createElement('div');
        item.className = 'team-list-item';

        const dot = document.createElement('span');
        dot.className = 'tli-role';
        dot.style.background = rs.color;

        const name = document.createElement('span');
        name.className   = 'tli-name';
        name.textContent = p.name;

        const team = document.createElement('span');
        team.className   = 'tli-team';
        team.textContent = p.team;

        const rm = document.createElement('span');
        rm.className   = 'tli-remove';
        rm.textContent = '×';
        rm.title       = `Remove ${p.name}`;
        rm.onclick = () => togglePlayer(p);

        item.append(dot, name, team, rm);
        list.appendChild(item);
    }

    // Budget info
    const budget = document.getElementById('sidebarBudget');
    if (currentTeam.length > 0) {
        const totalCost = currentTeam.reduce((s, p) => s + p.price, 0);
        const remain    = BUDGET - totalCost;
        budget.innerHTML = `
            <div class="sb-row"><span>Cost</span><span class="sb-val">${totalCost.toFixed(1)} VP</span></div>
            <div class="sb-row"><span>Remaining</span>
                <span class="sb-val ${remain >= 0 ? 'ok' : 'warn'}">${remain.toFixed(1)} VP</span>
            </div>
        `;
        budget.style.display = '';
    } else {
        budget.style.display = 'none';
    }

    // Update counter badge
    const badge = document.getElementById('selCountBadge');
    badge.textContent = `${currentTeam.length} / 11`;
    badge.className   = 'sel-count-badge' + (currentTeam.length === 11 ? ' complete' : '');

    // Enable / disable suggest button
    document.getElementById('suggestBtn').disabled = currentTeam.length !== 11;
}

function togglePlayer(p) {
    const idx = currentTeam.findIndex(t => t.name === p.name);
    if (idx >= 0) {
        currentTeam.splice(idx, 1);
    } else {
        if (currentTeam.length < 11) currentTeam.push(p);
    }
    renderPool();
    renderTeamSidebar();
}

function filterPool() {
    searchTerm = document.getElementById('searchBox').value;
    renderPool();
}

function setRegionFilter(region, btn) {
    activeRegion = region;
    document.querySelectorAll('.rf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPool();
}

function showSelectionPhase() {
    document.getElementById('statusArea').classList.add('hidden');
    document.getElementById('selectionPhase').classList.remove('hidden');
    document.getElementById('resultsPhase').classList.add('hidden');
    renderPool();
    renderTeamSidebar();
}

// ── Result rendering ──────────────────────────────────────────────────────────
function makePlayerCard(p, modifier = '') {
    const rs = ROLE_STYLE[p.role] || ROLE_STYLE.wildcard;

    const card = document.createElement('div');
    card.className = 'player-card' + (modifier ? ' ' + modifier : '');
    card.style.setProperty('--role-color', rs.color);
    card.style.setProperty('--role-bg',    rs.bg);

    const top = document.createElement('div');
    top.className = 'card-top';

    const badges = document.createElement('div');
    badges.className = 'card-badges';

    const roleBadge = document.createElement('span');
    roleBadge.className   = 'role-badge';
    roleBadge.textContent = p.role;
    badges.appendChild(roleBadge);

    const regionBadge = document.createElement('span');
    regionBadge.className   = `region-badge ${p.region}`;
    regionBadge.textContent = p.region === 'americas' ? 'AME' : p.region === 'pacific' ? 'PAC' : 'EMEA';
    badges.appendChild(regionBadge);

    const ptsEl = document.createElement('span');
    ptsEl.className   = 'card-pts';
    ptsEl.textContent = `${p.pts.toFixed(2)} pts`;

    top.append(badges, ptsEl);

    const nameEl = document.createElement('div');
    nameEl.className   = 'card-name';
    nameEl.textContent = p.name;

    const teamRow = document.createElement('div');
    teamRow.className = 'card-team';
    teamRow.append(makeLogoEl(p.team));
    const tn = document.createElement('span');
    tn.className   = 'team-name-text';
    tn.textContent = p.team;
    teamRow.appendChild(tn);

    const priceEl = document.createElement('div');
    priceEl.className = 'card-price';
    priceEl.innerHTML = `Price: <span>${p.price} VP</span>`;

    card.append(top, nameEl, teamRow, priceEl);
    return card;
}

function renderGrid(id, players, modifier = '') {
    const grid = document.getElementById(id);
    grid.innerHTML = '';
    const ORDER = { duelist:0, controller:1, initiator:2, sentinel:3 };
    const sorted = [...players].sort((a, b) =>
        (ORDER[a.role] ?? 9) - (ORDER[b.role] ?? 9) || b.pts - a.pts
    );
    for (const p of sorted) grid.appendChild(makePlayerCard(p, modifier));
}

function showResults(result, ptsBefore) {
    const { drop, add, kept, newPts } = result;
    const gain = newPts - ptsBefore;

    // Summary
    document.getElementById('tsPtsBefore').textContent = ptsBefore.toFixed(2);
    document.getElementById('tsPtsAfter').textContent  = newPts.toFixed(2);

    const gainEl = document.getElementById('tsPtsGain');
    gainEl.textContent = (gain >= 0 ? '+' : '') + gain.toFixed(2);
    gainEl.className   = `ts-val ${gain >= 0 ? 'gain-pos' : 'gain-neg'}`;

    const newTeam = [...kept, ...add];
    const totalCost = newTeam.reduce((s, p) => s + p.price, 0);
    const remain    = BUDGET - totalCost;
    const budgetEl  = document.getElementById('tsBudget');
    budgetEl.textContent = `${remain.toFixed(1)} VP`;
    budgetEl.className   = `ts-val ${remain >= 0 ? 'budget-ok' : 'budget-warn'}`;

    const americasInNewTeam = newTeam.filter(p => p.region === 'americas').length;
    document.getElementById('tsAmericasCount').textContent =
        `${americasInNewTeam} / 11`;

    // Grids
    renderGrid('dropGrid', drop, 'card-out');
    renderGrid('addGrid',  add,  'card-in');
    renderGrid('fullTeamGrid', newTeam);

    const americasIn = add.filter(p => p.region === 'americas').length;
    document.getElementById('metaNote').textContent =
        `${americasIn}/3 incoming players are Americas · max 2 per team · 100 VP budget`;

    document.getElementById('selectionPhase').classList.add('hidden');
    document.getElementById('resultsPhase').classList.remove('hidden');
}

// ── Transfer optimizer entry point ────────────────────────────────────────────
async function runTransferOptimizer() {
    document.getElementById('suggestBtn').disabled = true;
    setStatus('<span class="spinner"></span> Finding best transfers…');

    await new Promise(r => setTimeout(r, 40)); // yield to paint

    const currentNames = new Set(currentTeam.map(p => p.name));
    const pool = allPlayers.filter(p => !currentNames.has(p.name));

    const ptsBefore = currentTeam.reduce((s, p) => s + p.pts, 0);
    const result    = solveTransfers(currentTeam, pool);

    if (!result) {
        setStatus(`<span class="error-text">
            No valid transfer found.<br>
            Check that your team budget is ≤ 100 VP and all players have live prices.
        </span>`);
        document.getElementById('suggestBtn').disabled = false;
        showSelectionPhase();
        return;
    }

    showResults(result, ptsBefore);
    document.getElementById('suggestBtn').disabled = false;
}

// ── Initial data load ─────────────────────────────────────────────────────────
async function init() {
    setStatus('<span class="spinner"></span> Loading player data…');

    const [vctResp, priceMap] = await Promise.all([
        fetch('./vct_data.json', { cache: 'no-cache' })
            .then(r => r.ok ? r.json() : null)
            .catch(() => null),
        fetchVflPrices(),
    ]);

    if (!vctResp || !Array.isArray(vctResp.teams)) {
        setStatus(`<span class="error-text">
            Could not load <code>vct_data.json</code>.<br>
            Run <code>python scraper/scrape_vct.py</code> then refresh.
        </span>`);
        return;
    }

    // Build pts map + logo map from vct_data.json
    const ptsMap = new Map();
    for (const team of vctResp.teams) {
        if (team.logo) teamLogoMap.set(team.name, team.logo);
        for (const p of team.players || []) {
            if (p.vflPts != null) ptsMap.set(normName(p.name), p.vflPts);
        }
    }

    // Enrich VFL_ROLES with pts + prices
    const missingPrice = [];
    for (const rp of VFL_ROLES) {
        const key   = normName(rp.name);
        const pts   = ptsMap.get(key);
        const price = priceMap.get(key);
        if (pts   == null) continue;
        if (price == null) { missingPrice.push(rp.name); continue; }
        if (price <= 0)    continue;
        allPlayers.push({ ...rp, pts, price });
    }

    // Sort by pts desc for display
    allPlayers.sort((a, b) => b.pts - a.pts);

    if (allPlayers.length < 11) {
        const note = missingPrice.length
            ? `<br><small>No VFL price for: ${missingPrice.slice(0, 6).join(', ')}${missingPrice.length > 6 ? '…' : ''}</small>`
            : '';
        setStatus(`<span class="error-text">
            Only ${allPlayers.length} eligible players found — VFL prices may be unavailable.${note}
            <br>Try again later.
        </span>`);
        return;
    }

    showSelectionPhase();
}

init();
</script>
