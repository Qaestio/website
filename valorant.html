<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCT 2026 Teams</title>
    <style>
        :root {
            --bg:       #0f0f0f;
            --surface:  #161616;
            --surface2: #1e1e1e;
            --border:   #272727;
            --text:     #e0e0e0;
            --muted:    #888;
            --dim:      #4a4a4a;

            --americas-c:  #f0923b;
            --americas-bg: rgba(240,146,59,0.13);
            --emea-c:      #f0c040;
            --emea-bg:     rgba(240,192,64,0.13);
            --pacific-c:   #5b9cf6;
            --pacific-bg:  rgba(91,156,246,0.13);
            --china-c:     #e05252;
            --china-bg:    rgba(224,82,82,0.13);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; flex-direction: column; overflow: hidden; }

        .hidden { display: none !important; }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 52px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 1rem;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .topbar-title { font-weight: 600; font-size: 1rem; }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 0.75rem;
        }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.45rem 0.8rem;
            line-height: 1;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover { background: #252525; border-color: #383838; }

        .sort-group {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .sbtn {
            background: none;
            border: none;
            padding: 0.45rem 0.9rem;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .sbtn + .sbtn            { border-left: 1px solid var(--border); }
        .sbtn.active             { background: var(--surface2); color: var(--text); }
        .sbtn:hover:not(.active) { color: var(--text); }

        /* ── Region filters ── */
        .filters {
            display: flex;
            gap: 0.4rem;
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            border: 1px solid transparent;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.15s;
        }
        .chip .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .chip.off   { opacity: 0.3; }

        /* ── Main scroll area ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem 2rem;
        }
        .main::-webkit-scrollbar       { width: 5px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        /* ── Team list ── */
        .team-list {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            max-width: 820px;
            margin: 0 auto;
        }

        /* ── Team row ── */
        .team-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 0.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--rc, var(--border));
            border-radius: 8px;
            transition: background 0.1s;
        }
        .team-row:hover { background: var(--surface2); }

        .team-rank {
            font-size: 0.7rem;
            color: var(--dim);
            width: 18px;
            text-align: right;
            flex-shrink: 0;
        }

        .team-logo {
            width: 34px;
            height: 34px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 3px;
        }
        .team-logo-ph {
            width: 34px;
            height: 34px;
            background: var(--surface2);
            border-radius: 3px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--dim);
        }

        .team-info { flex: 1; min-width: 0; }
        .team-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .region-badge {
            display: inline-block;
            font-size: 0.62rem;
            padding: 1px 6px;
            border-radius: 8px;
            margin-top: 2px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .team-stats {
            display: flex;
            gap: 1.25rem;
            flex-shrink: 0;
            align-items: center;
        }
        .stat-col {
            text-align: center;
            min-width: 58px;
        }
        .stat-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }
        .stat-val {
            font-size: 0.87rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .stat-val .w   { color: #52c77a; }
        .stat-val .l   { color: #e05252; }
        .stat-val .sep { color: var(--dim); }
        .stat-val.na   { color: var(--dim); font-size: 0.75rem; font-weight: 400; }

        /* ── Status / loading ── */
        .status {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
            font-size: 0.88rem;
            max-width: 820px;
            margin: 0 auto;
        }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--muted);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .source-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--dim);
            margin-top: 1.5rem;
        }

        /* ── Column headers ── */
        .list-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0 0.9rem 0.35rem;
            max-width: 820px;
            margin: 0 auto;
        }
        .lh-rank   { width: 18px; flex-shrink: 0; }
        .lh-logo   { width: 34px; flex-shrink: 0; }
        .lh-info   { flex: 1; min-width: 0; }
        .lh-stats  { display: flex; gap: 1.25rem; flex-shrink: 0; }
        .lh-stat   { min-width: 58px; text-align: center; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }

        /* ── Team block (row + dropdown wrapper) ── */
        .team-block { display: flex; flex-direction: column; }

        .team-row {
            cursor: pointer;
            user-select: none;
        }
        .team-row.expanded {
            border-radius: 8px 8px 0 0;
            border-bottom-color: transparent;
        }
        .expand-chevron {
            color: var(--dim);
            font-size: 0.7rem;
            flex-shrink: 0;
            margin-left: 0.3rem;
            transition: transform 0.18s ease;
            line-height: 1;
        }
        .team-row.expanded .expand-chevron { transform: rotate(180deg); }

        /* ── Player dropdown ── */
        .player-dropdown {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            border-left: 3px solid var(--rc, var(--border));
            border-radius: 0 0 8px 8px;
        }
        .player-dropdown.open { display: block; }

        /* pd-header and pd-row share grid layout aligned with team row content */
        .pd-header,
        .pd-row {
            display: grid;
            grid-template-columns: 1fr 58px 58px 64px 20px;
            gap: 0.4rem;
            align-items: center;
            padding: 0.28rem 0.9rem;
            padding-left: calc(0.9rem + 18px + 0.8rem + 34px + 0.8rem);
        }
        .pd-header {
            border-bottom: 1px solid var(--border);
            padding-top: 0.45rem;
            padding-bottom: 0.35rem;
        }
        .pd-header span {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: right;
        }
        .pd-header span:first-child { text-align: left; }
        .pd-row { transition: background 0.1s; }
        .pd-row:hover { background: var(--surface2); }

        .pd-name {
            font-size: 0.84rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pd-val {
            font-size: 0.82rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .pd-val.hi  { color: #52c77a; }
        .pd-val.lo  { color: #e05252; }
        .pd-val.dim { color: var(--dim); }

        .pd-msg {
            padding: 0.75rem 0.9rem 0.75rem calc(0.9rem + 18px + 0.8rem + 34px + 0.8rem);
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* ── Responsive ── */
        @media (max-width: 540px) {
            .controls { height: auto; padding: 0.5rem 0.75rem; flex-wrap: wrap; }
            .team-stats { gap: 0.75rem; }
            .stat-col { min-width: 48px; }
            .team-rank { display: none; }
            .lh-rank   { display: none; }
            .pd-header,
            .pd-row    { padding-left: 0.9rem; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-left">
        <a class="back-link" href="index.html">← Home</a>
        <span class="topbar-title">VCT 2026 Teams</span>
    </div>
    <button class="btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
</div>

<!-- Controls -->
<div class="controls">
    <div style="display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:0.78rem;color:var(--muted)">Sort:</span>
        <div class="sort-group">
            <button class="sbtn active" id="sAlpha"  onclick="setSort('alpha')">A–Z</button>
            <button class="sbtn"        id="sRegion" onclick="setSort('region')">Region</button>
            <button class="sbtn"        id="sRecord" onclick="setSort('record')">Win %</button>
        </div>
    </div>
    <span id="teamCount" style="font-size:0.78rem;color:var(--dim)"></span>
</div>

<!-- Region filter chips -->
<div class="filters" id="filters"></div>

<!-- Content -->
<div class="main">
    <div id="statusEl" class="status"><span class="spinner"></span> Loading teams…</div>

    <div id="listHeader" class="list-header hidden">
        <div class="lh-rank"></div>
        <div class="lh-logo"></div>
        <div class="lh-info"></div>
        <div class="lh-stats">
            <div class="lh-stat">Match</div>
            <div class="lh-stat">Maps</div>
        </div>
    </div>

    <div id="teamList" class="team-list hidden"></div>

    <div id="sourceNote" class="source-note hidden">
        Data scraped from <a href="https://vlr.gg" target="_blank" rel="noopener"
            style="color:var(--muted);text-decoration:none">vlr.gg</a>
        · <span id="dataMode"></span>
    </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────

const REGIONS = {
    americas: { label: 'Americas', color: 'var(--americas-c)', rawColor: '#f0923b', bg: 'var(--americas-bg)' },
    emea:     { label: 'EMEA',     color: 'var(--emea-c)',     rawColor: '#f0c040', bg: 'var(--emea-bg)'     },
    pacific:  { label: 'Pacific',  color: 'var(--pacific-c)',  rawColor: '#5b9cf6', bg: 'var(--pacific-bg)'  },
    china:    { label: 'China',    color: 'var(--china-c)',    rawColor: '#e05252', bg: 'var(--china-bg)'    },
};

const REGION_ORDER = { americas: 0, emea: 1, pacific: 2, china: 3 };

// ── State ──────────────────────────────────────────────────────────────────────

let allTeams  = [];
let activeReg = new Set(Object.keys(REGIONS));
let sortMode  = 'alpha';

const expandedTeams   = new Set();
const playerHtmlCache = {};

// ── Data loading ───────────────────────────────────────────────────────────────

async function loadData() {
    document.getElementById('refreshBtn').disabled = true;
    setStatus('<span class="spinner"></span> Loading teams…');
    document.getElementById('teamList').classList.add('hidden');
    document.getElementById('listHeader').classList.add('hidden');
    document.getElementById('sourceNote').classList.add('hidden');
    allTeams = [];
    Object.keys(playerHtmlCache).forEach(k => delete playerHtmlCache[k]);
    expandedTeams.clear();

    const ok = await loadViaJson();
    if (!ok) {
        setStatus(`<div style="color:#e05252">
            Could not load <code style="font-size:0.85em">vct_data.json</code>.<br>
            Run <code style="font-size:0.85em">python scraper/scrape_vct.py</code> to generate it, then refresh.
            <br><button class="btn" onclick="loadData()" style="margin-top:0.75rem">↻ Retry</button>
        </div>`);
        document.getElementById('refreshBtn').disabled = false;
        return;
    }

    document.getElementById('sourceNote').classList.remove('hidden');
    buildFilters();
    render();
    document.getElementById('refreshBtn').disabled = false;
    clearStatus();
}

async function loadViaJson() {
    let data;
    try {
        const r = await fetch('./vct_data.json', { cache: 'no-cache' });
        if (!r.ok) return false;
        data = await r.json();
    } catch (e) {
        return false;
    }

    if (!Array.isArray(data?.teams) || data.teams.length < 10) return false;

    allTeams = data.teams.map(t => ({
        name:    t.name,
        logo:    t.logo   || '',
        region:  t.region,
        matchW:  t.matchW || 0,
        matchL:  t.matchL || 0,
        mapW:    t.mapW   || 0,
        mapL:    t.mapL   || 0,
        players: t.players || [],
    }));

    let updatedStr = '';
    if (data.lastUpdated) {
        try {
            const d = new Date(data.lastUpdated);
            updatedStr = ` · updated ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
        } catch (_) {}
    }
    document.getElementById('dataMode').innerHTML =
        `match &amp; map records${updatedStr}`;

    return true;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function normName(s) {
    return s.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]/g, '');
}

function winRate(t) {
    const total = t.matchW + t.matchL;
    return total === 0 ? -1 : t.matchW / total;
}

function setStatus(html) {
    const el = document.getElementById('statusEl');
    el.innerHTML = html;
    el.classList.remove('hidden');
}

function clearStatus() {
    document.getElementById('statusEl').classList.add('hidden');
}

// ── Player stats ───────────────────────────────────────────────────────────────

function pdValClass(val, hiThresh, loThresh) {
    if (val >= hiThresh) return 'pd-val hi';
    if (val <= loThresh) return 'pd-val lo';
    return 'pd-val';
}

async function openPlayerDropdown(dropdownEl, team) {
    const key = normName(team.name);

    if (playerHtmlCache[key]) {
        dropdownEl.innerHTML = playerHtmlCache[key];
        return;
    }

    if (!team.players || team.players.length === 0) {
        const msg = '<div class="pd-msg">No player stats available — re-run the scraper to update.</div>';
        dropdownEl.innerHTML = msg;
        playerHtmlCache[key] = msg;
        return;
    }

    const frag = document.createDocumentFragment();

    // Header row
    const hdr = document.createElement('div');
    hdr.className = 'pd-header';
    ['Player', 'ACS', 'Rating', 'FK/FD', ''].forEach(label => {
        const s = document.createElement('span');
        s.textContent = label;
        hdr.appendChild(s);
    });
    frag.appendChild(hdr);

    // Player rows
    team.players.forEach(p => {
        const row = document.createElement('div');
        row.className = 'pd-row';

        const nameEl = document.createElement('span');
        nameEl.className = 'pd-name';
        nameEl.textContent = p.name;

        const acsEl = document.createElement('span');
        acsEl.className = pdValClass(p.acs, 230, 180);
        acsEl.textContent = Math.round(p.acs);

        const ratingEl = document.createElement('span');
        ratingEl.className = pdValClass(p.rating, 1.15, 0.95);
        ratingEl.textContent = (p.rating || 0).toFixed(2);

        const fkfdEl = document.createElement('span');
        const hasFkfd = p.fkfd > 0;
        fkfdEl.className = hasFkfd ? pdValClass(p.fkfd, 1.1, 0.9) : 'pd-val dim';
        fkfdEl.textContent = hasFkfd ? p.fkfd.toFixed(2) : '–';

        row.append(nameEl, acsEl, ratingEl, fkfdEl, document.createElement('span'));
        frag.appendChild(row);
    });

    dropdownEl.innerHTML = '';
    dropdownEl.appendChild(frag);
    playerHtmlCache[key] = dropdownEl.innerHTML;
}

// ── Filters ────────────────────────────────────────────────────────────────────

function buildFilters() {
    const cont = document.getElementById('filters');
    cont.innerHTML = '';
    Object.entries(REGIONS).forEach(([k, r]) => {
        const on   = activeReg.has(k);
        const chip = document.createElement('div');
        chip.className = `chip${on ? '' : ' off'}`;
        chip.style.cssText = on
            ? `background:${r.bg};border-color:${r.rawColor}44;color:${r.rawColor}`
            : `background:transparent;border-color:var(--border);color:var(--muted)`;

        const dot = document.createElement('span');
        dot.className = 'cdot';
        dot.style.background = r.rawColor;

        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(r.label));
        chip.addEventListener('click', () => {
            if (activeReg.has(k) && activeReg.size > 1) activeReg.delete(k);
            else activeReg.add(k);
            buildFilters();
            render();
        });
        cont.appendChild(chip);
    });
}

// ── Sort ───────────────────────────────────────────────────────────────────────

function setSort(mode) {
    sortMode = mode;
    document.getElementById('sAlpha').classList.toggle('active',  mode === 'alpha');
    document.getElementById('sRegion').classList.toggle('active', mode === 'region');
    document.getElementById('sRecord').classList.toggle('active', mode === 'record');
    render();
}

function sortedTeams() {
    const visible = allTeams.filter(t => activeReg.has(t.region));
    if (sortMode === 'alpha') {
        return [...visible].sort((a, b) => a.name.localeCompare(b.name));
    }
    if (sortMode === 'region') {
        return [...visible].sort((a, b) => {
            const rd = REGION_ORDER[a.region] - REGION_ORDER[b.region];
            return rd !== 0 ? rd : winRate(b) - winRate(a);
        });
    }
    // record / win %
    return [...visible].sort((a, b) => {
        const wd = winRate(b) - winRate(a);
        if (wd !== 0) return wd;
        return (b.matchW + b.matchL) - (a.matchW + a.matchL); // more games = higher if same %
    });
}

// ── Render ─────────────────────────────────────────────────────────────────────

function render() {
    const list   = document.getElementById('teamList');
    const header = document.getElementById('listHeader');
    list.innerHTML = '';

    const teams = sortedTeams();
    document.getElementById('teamCount').textContent =
        `${teams.length} team${teams.length !== 1 ? 's' : ''}`;

    if (teams.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted)">No teams to display.</div>';
        list.classList.remove('hidden');
        header.classList.add('hidden');
        return;
    }

    header.classList.remove('hidden');

    teams.forEach((t, i) => {
        const r       = REGIONS[t.region];
        const teamKey = normName(t.name);
        const isExp   = expandedTeams.has(teamKey);

        // ── Block wrapper ──────────────────────────────────────────────────────
        const block = document.createElement('div');
        block.className = 'team-block';

        // ── Team row ───────────────────────────────────────────────────────────
        const row = document.createElement('div');
        row.className = 'team-row' + (isExp ? ' expanded' : '');
        row.style.setProperty('--rc', r.rawColor);

        // Rank number
        const rank = document.createElement('span');
        rank.className = 'team-rank';
        rank.textContent = sortMode === 'record' ? `${i + 1}` : '';

        // Logo
        let logoEl;
        if (t.logo) {
            logoEl = document.createElement('img');
            logoEl.className = 'team-logo';
            logoEl.src  = t.logo;
            logoEl.alt  = t.name;
            logoEl.loading = 'lazy';
            logoEl.onerror = function () {
                const ph = document.createElement('div');
                ph.className = 'team-logo-ph';
                ph.textContent = t.name.slice(0, 2).toUpperCase();
                this.replaceWith(ph);
            };
        } else {
            logoEl = document.createElement('div');
            logoEl.className = 'team-logo-ph';
            logoEl.textContent = t.name.slice(0, 2).toUpperCase();
        }

        // Info
        const info = document.createElement('div');
        info.className = 'team-info';
        const name = document.createElement('div');
        name.className = 'team-name';
        name.textContent = t.name;
        const badge = document.createElement('span');
        badge.className = 'region-badge';
        badge.textContent = r.label;
        badge.style.cssText = `background:${r.bg};color:${r.rawColor}`;
        info.append(name, badge);

        // Team stats
        const stats = document.createElement('div');
        stats.className = 'team-stats';
        stats.appendChild(makeStatCol('Match', t.matchW, t.matchL));
        stats.appendChild(makeStatCol('Maps',  t.mapW,   t.mapL));

        // Chevron
        const chev = document.createElement('span');
        chev.className = 'expand-chevron';
        chev.textContent = '▾';

        row.append(rank, logoEl, info, stats, chev);

        // ── Player dropdown ────────────────────────────────────────────────────
        const dropdown = document.createElement('div');
        dropdown.className = 'player-dropdown' + (isExp ? ' open' : '');
        dropdown.style.setProperty('--rc', r.rawColor);

        if (isExp) openPlayerDropdown(dropdown, t);

        // Toggle on click
        row.addEventListener('click', () => {
            if (expandedTeams.has(teamKey)) {
                expandedTeams.delete(teamKey);
                row.classList.remove('expanded');
                dropdown.classList.remove('open');
                dropdown.innerHTML = '';
            } else {
                expandedTeams.add(teamKey);
                row.classList.add('expanded');
                dropdown.classList.add('open');
                openPlayerDropdown(dropdown, t);
            }
        });

        block.append(row, dropdown);
        list.appendChild(block);
    });

    list.classList.remove('hidden');
}

function makeStatCol(label, w, l) {
    const col = document.createElement('div');
    col.className = 'stat-col';

    const lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = label;

    const val = document.createElement('div');

    if (w > 0 || l > 0) {
        val.className = 'stat-val';

        const wEl = document.createElement('span');
        wEl.className = 'w';
        wEl.textContent = w;

        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '–';

        const lEl = document.createElement('span');
        lEl.className = 'l';
        lEl.textContent = l;

        val.append(wEl, sep, lEl);
    } else {
        val.className = 'stat-val na';
        val.textContent = '–';
    }

    col.append(lbl, val);
    return col;
}

// ── Init ───────────────────────────────────────────────────────────────────────

buildFilters();
loadData();
</script>
