<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCT 2026 Teams</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; flex-direction: column; overflow: hidden; }

        .hidden { display: none !important; }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 52px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 1rem;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .topbar-title { font-weight: 600; font-size: 1rem; }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 0.75rem;
        }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.45rem 0.8rem;
            line-height: 1;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover { background: #252525; border-color: #383838; }

        .sort-group {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .sbtn {
            background: none;
            border: none;
            padding: 0.45rem 0.9rem;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .sbtn + .sbtn            { border-left: 1px solid var(--border); }
        .sbtn.active             { background: var(--surface2); color: var(--text); }
        .sbtn:hover:not(.active) { color: var(--text); }

        /* ── Region filters ── */
        .filters {
            display: flex;
            gap: 0.4rem;
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            border: 1px solid transparent;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.15s;
        }
        .chip .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .chip.off   { opacity: 0.3; }

        /* ── Main scroll area ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem 2rem;
        }
        .main::-webkit-scrollbar       { width: 5px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        /* ── Team list ── */
        .team-list {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            max-width: 820px;
            margin: 0 auto;
        }

        /* ── Team row ── */
        .team-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 0.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--rc, var(--border));
            border-radius: 8px;
            transition: background 0.1s;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
            color: inherit;
        }
        .team-row:hover { background: var(--surface2); }

        .team-rank {
            font-size: 0.7rem;
            color: var(--dim);
            width: 18px;
            text-align: right;
            flex-shrink: 0;
        }

        .team-logo {
            width: 34px;
            height: 34px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 3px;
        }
        .team-logo-ph {
            width: 34px;
            height: 34px;
            background: var(--surface2);
            border-radius: 3px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--dim);
        }

        .team-info { flex: 1; min-width: 0; }
        .team-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .region-badge {
            display: inline-block;
            font-size: 0.62rem;
            padding: 1px 6px;
            border-radius: 8px;
            margin-top: 2px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .team-stats {
            display: flex;
            gap: 1.25rem;
            flex-shrink: 0;
            align-items: center;
        }
        .stat-col {
            text-align: center;
            min-width: 58px;
        }
        .stat-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }
        .stat-val {
            font-size: 0.87rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .stat-val .w   { color: #52c77a; }
        .stat-val .l   { color: #e05252; }
        .stat-val .sep { color: var(--dim); }
        .stat-val.na         { color: var(--dim); font-size: 0.75rem; font-weight: 400; }
        .stat-val.rating-val { color: var(--fg); letter-spacing: 0.02em; }

        /* ── Status / loading ── */
        .status {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
            font-size: 0.88rem;
            max-width: 820px;
            margin: 0 auto;
        }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--muted);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .source-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--dim);
            margin-top: 1.5rem;
        }

        /* ── Column headers ── */
        .list-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0 0.9rem 0.35rem;
            max-width: 820px;
            margin: 0 auto;
        }
        .lh-rank   { width: 18px; flex-shrink: 0; }
        .lh-logo   { width: 34px; flex-shrink: 0; }
        .lh-info   { flex: 1; min-width: 0; }
        .lh-stats  { display: flex; gap: 1.25rem; flex-shrink: 0; }
        .lh-stat   { min-width: 58px; text-align: center; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }

        /* ── Search ── */
        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 0.55rem;
            color: var(--dim);
            font-size: 0.75rem;
            pointer-events: none;
        }
        .search-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.45rem 0.7rem 0.45rem 1.8rem;
            outline: none;
            width: 160px;
            transition: border-color 0.15s, width 0.2s;
        }
        .search-input::placeholder { color: var(--dim); }
        .search-input:focus { border-color: #444; width: 200px; }

        /* ── Responsive ── */
        @media (max-width: 540px) {
            .controls { height: auto; padding: 0.5rem 0.75rem; flex-wrap: wrap; }
            .team-stats { gap: 0.75rem; }
            .stat-col { min-width: 48px; }
            .team-rank { display: none; }
            .lh-rank   { display: none; }
            .search-input { width: 120px; }
            .search-input:focus { width: 140px; }
            .pd-header,
            .pd-row    { padding-left: 0.9rem; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-left">
        <a class="back-link" href="index.html">← Home</a>
        <span class="topbar-title">VCT 2026 Teams</span>
        <a class="back-link" href="players.html" style="margin-left:0.5rem">Players →</a>
        <a class="back-link" href="optimizer.html" style="margin-left:0.5rem">Optimizer →</a>
    </div>
    <button class="btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
</div>

<!-- Controls -->
<div class="controls">
    <div style="display:flex;align-items:center;gap:0.5rem">
        <span style="font-size:0.78rem;color:var(--muted)">Sort:</span>
        <div class="sort-group">
            <button class="sbtn active" id="sRating" onclick="setSort('rating')">Rating</button>
            <button class="sbtn"        id="sAlpha"  onclick="setSort('alpha')">A–Z</button>
            <button class="sbtn"        id="sRegion" onclick="setSort('region')">Region</button>
            <button class="sbtn"        id="sRecord" onclick="setSort('record')">Win %</button>
        </div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Search teams…"
                oninput="searchQuery=this.value;saveState();render()" autocomplete="off" spellcheck="false" />
        </div>
        <span id="teamCount" style="font-size:0.78rem;color:var(--dim)"></span>
    </div>
</div>

<!-- Region filter chips -->
<div class="filters" id="filters"></div>

<!-- Content -->
<div class="main">
    <div id="statusEl" class="status"><span class="spinner"></span> Loading teams…</div>

    <div id="listHeader" class="list-header hidden">
        <div class="lh-rank"></div>
        <div class="lh-logo"></div>
        <div class="lh-info"></div>
        <div class="lh-stats">
            <div class="lh-stat">Rating</div>
            <div class="lh-stat">Match</div>
            <div class="lh-stat">Maps</div>
        </div>
    </div>

    <div id="teamList" class="team-list hidden"></div>

    <div id="sourceNote" class="source-note hidden">
        Data scraped from <a href="https://vlr.gg" target="_blank" rel="noopener"
            style="color:var(--muted);text-decoration:none">vlr.gg</a>
        · <span id="dataMode"></span>
    </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────

const REGIONS = {
    americas: { label: 'Americas', color: 'var(--americas-c)', rawColor: '#f0923b', bg: 'var(--americas-bg)' },
    emea:     { label: 'EMEA',     color: 'var(--emea-c)',     rawColor: '#f0c040', bg: 'var(--emea-bg)'     },
    pacific:  { label: 'Pacific',  color: 'var(--pacific-c)',  rawColor: '#5b9cf6', bg: 'var(--pacific-bg)'  },
    china:    { label: 'China',    color: 'var(--china-c)',    rawColor: '#e05252', bg: 'var(--china-bg)'    },
};

const REGION_ORDER = { americas: 0, emea: 1, pacific: 2, china: 3 };

// ── State ──────────────────────────────────────────────────────────────────────

let allTeams   = [];
let activeReg  = new Set(Object.keys(REGIONS));
let sortMode   = 'rating';
let searchQuery = '';
let rowMap     = new Map(); // team name → DOM row element

// ── Session persistence ────────────────────────────────────────────────────────

function saveState() {
    sessionStorage.setItem('vct_sort',    sortMode);
    sessionStorage.setItem('vct_regions', JSON.stringify([...activeReg]));
    sessionStorage.setItem('vct_search',  searchQuery);
}

function restoreState() {
    const sort = sessionStorage.getItem('vct_sort');
    if (sort && ['rating','alpha','region','record'].includes(sort)) sortMode = sort;

    const regs = sessionStorage.getItem('vct_regions');
    if (regs) {
        try {
            const arr = JSON.parse(regs);
            if (Array.isArray(arr) && arr.length > 0) activeReg = new Set(arr);
        } catch (_) {}
    }

    const q = sessionStorage.getItem('vct_search');
    if (q) {
        searchQuery = q;
        const input = document.getElementById('searchInput');
        if (input) input.value = q;
    }

    ['sRating','sAlpha','sRegion','sRecord'].forEach(id => {
        const mode = { sRating:'rating', sAlpha:'alpha', sRegion:'region', sRecord:'record' }[id];
        document.getElementById(id).classList.toggle('active', mode === sortMode);
    });
}

// ── Data loading ───────────────────────────────────────────────────────────────

async function loadData() {
    document.getElementById('refreshBtn').disabled = true;
    setStatus('<span class="spinner"></span> Loading teams…');
    document.getElementById('teamList').classList.add('hidden');
    document.getElementById('listHeader').classList.add('hidden');
    document.getElementById('sourceNote').classList.add('hidden');
    allTeams = [];
    rowMap.clear();

    const ok = await loadViaJson();
    if (!ok) {
        setStatus(`<div style="color:#e05252">
            Could not load <code style="font-size:0.85em">vct_data.json</code>.<br>
            Run <code style="font-size:0.85em">python scraper/scrape_vct.py</code> to generate it, then refresh.
            <br><button class="btn" onclick="loadData()" style="margin-top:0.75rem">↻ Retry</button>
        </div>`);
        document.getElementById('refreshBtn').disabled = false;
        return;
    }

    document.getElementById('sourceNote').classList.remove('hidden');
    buildFilters();
    buildAllRows();
    render();
    document.getElementById('refreshBtn').disabled = false;
    clearStatus();
}

async function loadViaJson() {
    let data;
    try {
        const r = await fetch('./vct_data.json', { cache: 'no-cache' });
        if (!r.ok) return false;
        data = await r.json();
    } catch (e) {
        return false;
    }

    if (!Array.isArray(data?.teams) || data.teams.length < 10) return false;

    allTeams = data.teams.map(t => ({
        name:      t.name,
        logo:      t.logo      || '',
        region:    t.region,
        matchW:    t.matchW    || 0,
        matchL:    t.matchL    || 0,
        mapW:      t.mapW      || 0,
        mapL:      t.mapL      || 0,
        eloRating: t.eloRating || 1500,
    }));

    let updatedStr = '';
    if (data.lastUpdated) {
        try {
            const d = new Date(data.lastUpdated);
            updatedStr = ` · updated ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
        } catch (_) {}
    }
    document.getElementById('dataMode').innerHTML =
        `match &amp; map records${updatedStr}`;

    return true;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function normName(s) {
    return s.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]/g, '');
}

function winRate(t) {
    const total = t.matchW + t.matchL;
    return total === 0 ? -1 : t.matchW / total;
}

function setStatus(html) {
    const el = document.getElementById('statusEl');
    el.innerHTML = html;
    el.classList.remove('hidden');
}

function clearStatus() {
    document.getElementById('statusEl').classList.add('hidden');
}

// ── Filters ────────────────────────────────────────────────────────────────────

function buildFilters() {
    const cont = document.getElementById('filters');
    cont.innerHTML = '';
    Object.entries(REGIONS).forEach(([k, r]) => {
        const on   = activeReg.has(k);
        const chip = document.createElement('div');
        chip.className = `chip${on ? '' : ' off'}`;
        chip.style.cssText = on
            ? `background:${r.bg};border-color:${r.rawColor}44;color:${r.rawColor}`
            : `background:transparent;border-color:var(--border);color:var(--muted)`;

        const dot = document.createElement('span');
        dot.className = 'cdot';
        dot.style.background = r.rawColor;

        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(r.label));
        chip.addEventListener('click', () => {
            if (activeReg.has(k) && activeReg.size > 1) activeReg.delete(k);
            else activeReg.add(k);
            buildFilters();
            saveState();
            render();
        });
        cont.appendChild(chip);
    });
}

// ── Sort ───────────────────────────────────────────────────────────────────────

function setSort(mode) {
    sortMode = mode;
    document.getElementById('sRating').classList.toggle('active', mode === 'rating');
    document.getElementById('sAlpha').classList.toggle('active',  mode === 'alpha');
    document.getElementById('sRegion').classList.toggle('active', mode === 'region');
    document.getElementById('sRecord').classList.toggle('active', mode === 'record');
    saveState();
    render();
}

function sortedTeams() {
    const visible = allTeams.filter(t => activeReg.has(t.region));
    if (sortMode === 'rating') {
        return [...visible].sort((a, b) => b.eloRating - a.eloRating);
    }
    if (sortMode === 'alpha') {
        return [...visible].sort((a, b) => a.name.localeCompare(b.name));
    }
    if (sortMode === 'region') {
        return [...visible].sort((a, b) => {
            const rd = REGION_ORDER[a.region] - REGION_ORDER[b.region];
            return rd !== 0 ? rd : winRate(b) - winRate(a);
        });
    }
    return [...visible].sort((a, b) => {
        const wd = winRate(b) - winRate(a);
        if (wd !== 0) return wd;
        return (b.matchW + b.matchL) - (a.matchW + a.matchL);
    });
}

// ── Build rows once ────────────────────────────────────────────────────────────

function buildAllRows() {
    const list = document.getElementById('teamList');
    list.innerHTML = '';
    rowMap.clear();

    allTeams.forEach(t => {
        const r = REGIONS[t.region];

        const row = document.createElement('a');
        row.className = 'team-row';
        row.href = `team.html?team=${encodeURIComponent(t.name)}`;
        row.style.setProperty('--rc', r.rawColor);
        row.dataset.name = t.name;

        const rank = document.createElement('span');
        rank.className = 'team-rank';

        let logoEl;
        if (t.logo) {
            logoEl = document.createElement('img');
            logoEl.className = 'team-logo';
            logoEl.src  = t.logo;
            logoEl.alt  = t.name;
            logoEl.loading = 'lazy';
            logoEl.onerror = function () {
                const ph = document.createElement('div');
                ph.className = 'team-logo-ph';
                ph.textContent = t.name.slice(0, 2).toUpperCase();
                this.replaceWith(ph);
            };
        } else {
            logoEl = document.createElement('div');
            logoEl.className = 'team-logo-ph';
            logoEl.textContent = t.name.slice(0, 2).toUpperCase();
        }

        const info = document.createElement('div');
        info.className = 'team-info';
        const name = document.createElement('div');
        name.className = 'team-name';
        name.textContent = t.name;
        const badge = document.createElement('span');
        badge.className = 'region-badge';
        badge.textContent = r.label;
        badge.style.cssText = `background:${r.bg};color:${r.rawColor}`;
        info.append(name, badge);

        const stats = document.createElement('div');
        stats.className = 'team-stats';
        stats.appendChild(makeRatingCol(t.eloRating));
        stats.appendChild(makeStatCol('Match', t.matchW, t.matchL));
        stats.appendChild(makeStatCol('Maps',  t.mapW,   t.mapL));

        row.append(rank, logoEl, info, stats);
        list.appendChild(row);
        rowMap.set(t.name, row);
    });
}

// ── Render — update visibility + order only, no DOM creation ──────────────────

function render() {
    const list   = document.getElementById('teamList');
    const header = document.getElementById('listHeader');

    if (rowMap.size === 0) return;

    const query  = searchQuery.trim().toLowerCase();
    const qNorm  = normName(query);
    const sorted = sortedTeams();
    const sortedNames = new Set(sorted.map(t => t.name));

    // Assign CSS flex-order to sorted teams
    sorted.forEach((t, i) => {
        const row = rowMap.get(t.name);
        if (row) row.style.order = i;
    });

    // Toggle visibility for every team
    allTeams.forEach(t => {
        const row = rowMap.get(t.name);
        if (!row) return;
        const inRegion   = sortedNames.has(t.name);
        const passSearch = !query ||
            t.name.toLowerCase().includes(query) ||
            normName(t.name).includes(qNorm);
        row.classList.toggle('hidden', !inRegion || !passSearch);
    });

    // Update rank numbers in sorted order, counting only visible rows
    let rank = 1;
    const showRank = sortMode === 'rating' || sortMode === 'record';
    sorted.forEach(t => {
        const row = rowMap.get(t.name);
        if (!row) return;
        const rankEl = row.querySelector('.team-rank');
        if (!rankEl) return;
        if (row.classList.contains('hidden')) {
            rankEl.textContent = '';
        } else {
            rankEl.textContent = showRank ? `${rank}` : '';
            rank++;
        }
    });

    const visibleCount = [...rowMap.values()].filter(r => !r.classList.contains('hidden')).length;
    document.getElementById('teamCount').textContent =
        `${visibleCount} team${visibleCount !== 1 ? 's' : ''}`;

    // No-results placeholder
    const noRes = list.querySelector('.no-results');
    if (visibleCount === 0 && allTeams.length > 0) {
        header.classList.add('hidden');
        if (!noRes) {
            const msg = document.createElement('div');
            msg.className = 'no-results';
            msg.style.cssText = 'text-align:center;padding:3rem;color:var(--muted)';
            msg.textContent = 'No teams match your search.';
            list.appendChild(msg);
        }
    } else {
        header.classList.remove('hidden');
        if (noRes) noRes.remove();
    }

    list.classList.remove('hidden');
}

function makeRatingCol(rating) {
    const col = document.createElement('div');
    col.className = 'stat-col';
    const lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = 'Rating';
    const val = document.createElement('div');
    val.className = 'stat-val rating-val';
    val.textContent = rating != null ? Math.round(rating).toLocaleString() : '–';
    col.append(lbl, val);
    return col;
}

function makeStatCol(label, w, l) {
    const col = document.createElement('div');
    col.className = 'stat-col';
    const lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = label;
    const val = document.createElement('div');
    if (w > 0 || l > 0) {
        val.className = 'stat-val';
        const wEl = document.createElement('span'); wEl.className = 'w'; wEl.textContent = w;
        const sep = document.createElement('span'); sep.className = 'sep'; sep.textContent = '–';
        const lEl = document.createElement('span'); lEl.className = 'l'; lEl.textContent = l;
        val.append(wEl, sep, lEl);
    } else {
        val.className = 'stat-val na';
        val.textContent = '–';
    }
    col.append(lbl, val);
    return col;
}

// ── Init ───────────────────────────────────────────────────────────────────────

restoreState();
buildFilters();
loadData();
</script>
