<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #ffffff;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            gap: 3rem;
        }

        .hero {
            text-align: center;
        }

        .hero h2 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .hero p {
            color: #808080;
            font-size: 1.1rem;
            max-width: 480px;
        }

        .pages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 700px;
        }

        .page-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 1.5rem;
            text-decoration: none;
            color: #e0e0e0;
            transition: border-color 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .page-card:hover {
            border-color: #555;
            background: #222;
        }

        .page-card .page-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .page-card .page-desc {
            font-size: 0.8rem;
            color: #606060;
        }

        footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid #2a2a2a;
            text-align: center;
            font-size: 0.8rem;
            color: #505050;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Website</h1>
        <nav>
            <a href="calendar.html">Calendar</a>
            <a href="valorant.html">VCT</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h2>Welcome</h2>
            <p>Select a page below to get started.</p>
        </div>

        <div class="pages">
            <a class="page-card" href="calendar.html">
                <span class="page-name">Calendar</span>
                <span class="page-desc">Schedule & appointments</span>
            </a>
            <a class="page-card" href="valorant.html">
                <span class="page-name">VCT 2026</span>
                <span class="page-desc">Valorant team stats</span>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 My Website
    </footer>
</body>
</html>
