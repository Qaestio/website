<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --school-c:   #5b9cf6;
            --school-bg:  rgba(91,156,246,0.15);
            --health-c:   #52c77a;
            --health-bg:  rgba(82,199,122,0.15);
            --personal-c: #c084e8;
            --personal-bg:rgba(192,132,232,0.15);
            --social-c:   #f0923b;
            --social-bg:  rgba(240,146,59,0.15);

            --hour-h: 62px;
            --time-w: 56px;
            --hdr-h:  52px;
        }

        html, body {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; flex-direction: column; overflow: hidden; }

        .hidden { display: none !important; }

        /* ── Undo toast ── */
        .undo-toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 0.82rem;
            color: var(--text);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 9999;
            white-space: nowrap;
        }
        .undo-toast.visible { opacity: 1; }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 52px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 1rem;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .topbar-title { font-weight: 600; font-size: 1rem; }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 0.75rem;
        }
        .nav-group { display: flex; align-items: center; gap: 0.4rem; }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            padding: 0.45rem 0.8rem;
            line-height: 1;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover   { background: #252525; border-color: #383838; }
        .btn.icon    { padding: 0.45rem 0.65rem; font-size: 1rem; }
        .btn.primary { background: #2f6edd; border-color: #2f6edd; color: #fff; }
        .btn.primary:hover { background: #3d7dee; border-color: #3d7dee; }
        .btn.danger  { color: #e05252; border-color: rgba(224,82,82,0.3); }
        .btn.danger:hover { background: rgba(224,82,82,0.08); }

        .cur-label {
            font-size: 0.88rem;
            font-weight: 600;
            min-width: 190px;
            text-align: center;
            white-space: nowrap;
        }
        .view-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .vbtn {
            background: none;
            border: none;
            padding: 0.45rem 0.9rem;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .vbtn + .vbtn            { border-left: 1px solid var(--border); }
        .vbtn.active             { background: var(--surface2); color: var(--text); }
        .vbtn:hover:not(.active) { color: var(--text); }

        /* ── Filters ── */
        .filters {
            display: flex;
            gap: 0.4rem;
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            border: 1px solid transparent;
            font-size: 0.78rem;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.15s;
        }
        .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
        .chip.off  { opacity: 0.3; }

        /* ── Cal outer (holds grid + task panel side by side) ── */
        .cal-outer {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Calendar wrap ── */
        .cal-wrap {
            flex: 1;
            overflow: auto;
            min-width: 0;
            min-height: 0;
        }
        .cal-wrap::-webkit-scrollbar       { width: 5px; height: 5px; }
        .cal-wrap::-webkit-scrollbar-track { background: transparent; }
        .cal-wrap::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

        /* ── Grid ── */
        .cal-grid { display: flex; min-height: 100%; }

        /* Time column */
        .time-col {
            width: var(--time-w);
            flex-shrink: 0;
            position: sticky;
            left: 0;
            background: var(--bg);
            z-index: 20;
        }
        .time-corner {
            height: var(--hdr-h);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 25;
        }
        .time-cell {
            height: var(--hour-h);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 4px 8px 0;
            font-size: 0.67rem;
            color: var(--dim);
        }

        /* Days container */
        .days-wrap { flex: 1; display: flex; min-width: 0; }

        /* Day column */
        .day-col { flex: 1; min-width: 110px; position: relative; }
        .day-view .day-col { min-width: 0; }

        .day-hdr {
            height: var(--hdr-h);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
            gap: 2px;
        }
        .day-name {
            font-size: 0.67rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .day-num { font-size: 1.05rem; font-weight: 600; }
        .day-hdr.today .day-num {
            background: #2f6edd;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        /* Day body */
        .day-body { position: relative; }
        .h-cell {
            height: var(--hour-h);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
        }
        .h-cell:hover { background: rgba(255,255,255,0.02); }

        /* Appointments */
        .appt {
            position: absolute;
            left: 3px; right: 3px;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 0.72rem;
            overflow: hidden;
            cursor: pointer;
            z-index: 3;
            border-left: 3px solid;
            transition: filter 0.12s;
        }
        .appt:hover { filter: brightness(1.2); }
        .appt-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .appt-time  { opacity: 0.7; font-size: 0.66rem; margin-top: 1px; }
        .appt-text  { overflow: hidden; }

        /* Current time line */
        .now-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: #e05252;
            z-index: 4;
            pointer-events: none;
        }
        .now-line::before {
            content: '';
            position: absolute;
            left: -3px; top: -4px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #e05252;
        }

        /* ── Task panel ── */
        .tasks-panel {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }
        .tp-header {
            height: var(--hdr-h);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tp-title {
            font-weight: 600;
            font-size: 0.88rem;
        }
        .tp-add {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 0.75rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tp-input {
            flex: 1;
            min-width: 0;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.82rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .tp-input:focus { border-color: #3a3a3a; }
        .tp-add-btn {
            flex-shrink: 0;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 1.15rem;
            line-height: 1;
            padding: 0.3rem 0.55rem;
            transition: background 0.15s;
        }
        .tp-add-btn:hover { background: #252525; }

        /* Task list */
        .tp-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.25rem 0;
        }
        .tp-list::-webkit-scrollbar       { width: 4px; }
        .tp-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

        .tp-section {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.55rem 0.85rem 0.2rem;
        }
        .tp-empty {
            padding: 2rem 1rem;
            font-size: 0.82rem;
            color: var(--dim);
            text-align: center;
        }

        /* Individual task item */
        .task-item {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.45rem 0.85rem;
            transition: background 0.1s;
            user-select: none;
        }
        .task-item:hover { background: rgba(255,255,255,0.02); }
        .task-item.pinned { background: rgba(240,146,59,0.03); }
        .task-item.pinned:hover { background: rgba(240,146,59,0.06); }
        .task-item.dragging { opacity: 0.3; }
        .task-item.drag-before::before,
        .task-item.drag-after::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: #2f6edd;
            border-radius: 1px;
            pointer-events: none;
        }
        .task-item.drag-before::before { top: 0; }
        .task-item.drag-after::after   { bottom: 0; }

        /* Drag handle */
        .drag-handle {
            flex-shrink: 0;
            color: var(--dim);
            cursor: grab;
            display: flex;
            align-items: center;
            margin-top: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .task-item:hover .drag-handle { opacity: 1; }

        .task-check {
            width: 16px;
            height: 16px;
            min-width: 16px;
            border: 1.5px solid var(--dim);
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .task-check:hover { border-color: var(--muted); }
        .task-check.checked {
            background: #2f6edd;
            border-color: #2f6edd;
        }
        .task-check.checked::after {
            content: '';
            display: block;
            width: 4px;
            height: 7px;
            border: 1.5px solid #fff;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .task-text {
            flex: 1;
            font-size: 0.82rem;
            color: var(--text);
            word-break: break-word;
            line-height: 1.4;
        }
        .task-text.done {
            text-decoration: line-through;
            color: var(--dim);
        }

        /* Pin button on each task */
        .task-pin-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 1px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            margin-top: 1px;
            color: var(--dim);
            opacity: 0;
            transition: color 0.15s, opacity 0.15s;
        }
        .task-item:hover .task-pin-btn { opacity: 1; }
        .task-pin-btn.active           { color: #f0923b; opacity: 1; }
        .task-pin-btn:hover            { color: #f0923b; opacity: 1 !important; }

        .task-del {
            background: none;
            border: none;
            color: var(--dim);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
            flex-shrink: 0;
            margin-top: 1px;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }
        .task-item:hover .task-del { opacity: 1; }
        .task-del:hover { color: #e05252; }

        /* ── Modal ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }
        .overlay.hidden { display: none !important; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
            max-height: calc(100vh - 2rem);
            overflow-y: auto;
            overscroll-behavior: contain;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .modal::-webkit-scrollbar       { width: 4px; }
        .modal::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .modal-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .modal-hdr h2 { font-size: 1rem; font-weight: 600; }
        .close-btn {
            background: none; border: none;
            color: var(--muted); cursor: pointer;
            font-size: 1.4rem; line-height: 1; padding: 0;
        }
        .close-btn:hover { color: var(--text); }
        .field { margin-bottom: 0.85rem; }
        .label { display: block; font-size: 0.77rem; color: var(--muted); margin-bottom: 0.3rem; }
        .input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.87rem;
            outline: none;
            transition: border-color 0.15s;
            appearance: none;
        }
        .input:focus { border-color: #3a3a3a; }
        .input.err   { border-color: #e05252; }
        .err-msg { font-size: 0.72rem; color: #e05252; margin-top: 0.3rem; display: none; }
        .err-msg.show { display: block; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }

        /* Category selector */
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
        .cat-opt {
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            text-align: center;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .cat-opt .cdot { width: 7px; height: 7px; border-radius: 50%; }
        .cat-opt.sel   { color: #fff; border-color: transparent; }

        .section-divider { border: none; border-top: 1px solid var(--border); margin: 0.9rem 0; }

        .modal-footer {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }

        /* ── Detail popup ── */
        .popup {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.9rem 1rem;
            z-index: 50;
            width: 230px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.55);
        }
        .popup.hidden { display: none; }
        .popup-badge  { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; margin-bottom: 0.4rem; }
        .popup-title  { font-weight: 600; font-size: 0.88rem; margin-bottom: 0.2rem; }
        .popup-time   { font-size: 0.77rem; color: var(--muted); }
        .popup-repeat { font-size: 0.72rem; color: var(--dim); margin-top: 0.15rem; }
        .popup-notes  { font-size: 0.77rem; color: var(--dim); margin-top: 0.3rem; }
        .popup-btns   { display: flex; gap: 0.35rem; align-items: center; margin-top: 0.65rem; flex-wrap: wrap; }
        .popup-btns .btn { font-size: 0.77rem; padding: 0.32rem 0.6rem; }
        .popup-del-label { width: 100%; font-size: 0.72rem; color: var(--muted); margin-bottom: 0.1rem; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            :root {
                --time-w: 42px;
                --hdr-h:  46px;
                --hour-h: 56px;
            }
            .controls { padding: 0 0.75rem; }
            .filters  { padding: 0.5rem 0.75rem; }
            .topbar   { padding: 0 0.75rem; }
            .cur-label { min-width: 0; font-size: 0.8rem; }
            .day-col  { min-width: 88px; }
            .day-view .day-col { min-width: 0; }

            /* Stack cal and tasks vertically on mobile */
            .cal-outer { flex-direction: column; }
            .cal-wrap  { flex: 1; min-height: 0; }
            .tasks-panel {
                width: 100%;
                max-height: 42vh;
                flex-shrink: 0;
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-left">
        <a class="back-link" href="index.html">← Home</a>
        <span class="topbar-title">Calendar</span>
    </div>
    <button class="btn primary" onclick="openAdd()">+ Add</button>
</div>

<!-- Controls -->
<div class="controls">
    <div class="nav-group">
        <button class="btn icon" onclick="nav(-1)">‹</button>
        <span class="cur-label" id="curLabel"></span>
        <button class="btn icon" onclick="nav(1)">›</button>
        <button class="btn" onclick="goToday()">Today</button>
    </div>
    <div class="view-toggle">
        <button class="vbtn active" id="btnWeek" onclick="setView('week')">Week</button>
        <button class="vbtn"        id="btnDay"  onclick="setView('day')">Day</button>
    </div>
</div>

<!-- Category filters -->
<div class="filters" id="filters"></div>

<!-- Main content area: calendar grid + task panel -->
<div class="cal-outer">
    <div class="cal-wrap" id="calWrap">
        <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Task panel (day view only) -->
    <div class="tasks-panel hidden" id="tasksPanel">
        <div class="tp-header">
            <span class="tp-title">Tasks</span>
        </div>
        <div class="tp-add">
            <input  class="tp-input"   id="tpInput"  placeholder="Add a task…"
                    onkeydown="if(event.key==='Enter')addTask()" />
            <button class="tp-add-btn" onclick="addTask()">+</button>
        </div>
        <div class="tp-list" id="tpList"></div>
    </div>
</div>

<!-- Add / Edit modal -->
<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
    <div class="modal">
        <div class="modal-hdr">
            <h2 id="modalH">New Appointment</h2>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>

        <div class="field">
            <label class="label">Title</label>
            <input class="input" id="fTitle" placeholder="e.g. Doctor appointment" />
        </div>
        <div class="field">
            <label class="label">Category</label>
            <div class="cat-grid" id="catGrid"></div>
        </div>
        <div class="field">
            <label class="label">Date</label>
            <input class="input" id="fDate" type="date" />
        </div>
        <div class="row2">
            <div class="field">
                <label class="label">Start</label>
                <input class="input" id="fStart" type="time" />
            </div>
            <div class="field">
                <label class="label">End</label>
                <input class="input" id="fEnd" type="time" />
                <span class="err-msg" id="fEndErr">End must be after start</span>
            </div>
        </div>

        <hr class="section-divider" />

        <div class="field">
            <label class="label">Repeat</label>
            <select class="input" id="fRepeat" onchange="onRepeatChange()">
                <option value="none">Does not repeat</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly (same day)</option>
                <option value="custom">Custom interval…</option>
            </select>
        </div>
        <div class="hidden" id="customRow">
            <div class="row2">
                <div class="field">
                    <label class="label">Every</label>
                    <input class="input" id="fInterval" type="number" min="1" max="365" value="1" />
                </div>
                <div class="field">
                    <label class="label">&nbsp;</label>
                    <select class="input" id="fUnit">
                        <option value="days">Days</option>
                        <option value="weeks">Weeks</option>
                        <option value="months">Months</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="field hidden" id="untilRow">

    </div>

<div id="undoToast" class="undo-toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────

const CATS = {
    school:   { label: 'School',   color: '#5b9cf6', bg: 'rgba(91,156,246,0.16)'  },
    health:   { label: 'Health',   color: '#52c77a', bg: 'rgba(82,199,122,0.16)'  },
    personal: { label: 'Personal', color: '#c084e8', bg: 'rgba(192,132,232,0.16)' },
    social:   { label: 'Social',   color: '#f0923b', bg: 'rgba(240,146,59,0.16)'  },
};

const PRIORITY = { school: 4, health: 3, social: 2, personal: 1 };

const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_L = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August',
                'September','October','November','December'];
const START_H = 6;
const END_H   = 22;
const HOURS   = Array.from({length: END_H - START_H}, (_, i) => i + START_H);

// ── State ─────────────────────────────────────────────────────────────────────

let curDate   = new Date();
let curView   = 'week';
let appts     = JSON.parse(localStorage.getItem('cal_v1')       || '[]');
let tasks     = JSON.parse(localStorage.getItem('cal_tasks_v1') || '[]');
let selCat    = 'school';
let editId    = null;
let editDate  = null;   // specific occurrence date when editing a recurring event
let popupId   = null;
let popupDate = null;
let activeF   = new Set(Object.keys(CATS));
let dragId    = null;    // id of the task currently being dragged
let dragGroup = null;    // 'pinned' | 'regular'

// ── Utils ─────────────────────────────────────────────────────────────────────

const uid       = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const pad       = n  => String(n).padStart(2,'0');
const save      = () => localStorage.setItem('cal_v1', JSON.stringify(appts));
const saveTasks = () => localStorage.setItem('cal_tasks_v1', JSON.stringify(tasks));

// ── Undo ──────────────────────────────────────────────────────────────────────
const MAX_UNDO  = 30;
const undoStack = [];

function pushUndo() {
    undoStack.push(JSON.stringify(appts));
    if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function undo() {
    if (undoStack.length === 0) return;
    appts = JSON.parse(undoStack.pop());
    save();
    render();
    showToast('Undone');
}

let _toastTimer = null;
function showToast(msg) {
    const el = document.getElementById('undoToast');
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('visible'), 2000);
}
const mkEl      = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };

function dKey(d) {
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function parseDate(s) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
}
function timeToMin(t) {
    const [h,m] = t.split(':').map(Number);
    return h * 60 + m;
}
function minToPx(min) {
    const hh = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hour-h')) || 62;
    return ((min - START_H * 60) / 60) * hh;
}
function fmt12(t) {
    let [h,m] = t.split(':').map(Number);
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${pad(m)} ${ap}`;
}
function isToday(d) {
    const n = new Date();
    return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}
function weekDates(d) {
    const offset = d.getDay() === 0 ? -6 : 1 - d.getDay();
    const mon = new Date(d);
    mon.setDate(d.getDate() + offset);
    return Array.from({length:7}, (_,i) => {
        const dt = new Date(mon); dt.setDate(mon.getDate()+i); return dt;
    });
}

// ── Recurrence ────────────────────────────────────────────────────────────────

function isOccurrence(a, targetDate) {
    const orig   = parseDate(a.date);
    const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
    const diffMs = target - orig;
    if (diffMs < 0) return false;

    const rep = a.repeat;
    if (rep.until) {
        const until = parseDate(rep.until);
        if (target > until) return false;
    }

    const diffDays = Math.round(diffMs / 86400000);

    if (rep.type === 'daily')   return true;
    if (rep.type === 'weekly')  return diffDays % 7 === 0;
    if (rep.type === 'monthly') {
        if (target.getDate() !== orig.getDate()) return false;
        const mDiff = (target.getFullYear() - orig.getFullYear()) * 12 + (target.getMonth() - orig.getMonth());
        return mDiff >= 0;
    }
    if (rep.type === 'custom') {
        const n = Math.max(1, rep.interval || 1);
        const u = rep.unit || 'days';
        if (u === 'days')  return diffDays % n === 0;
        if (u === 'weeks') return diffDays % (n * 7) === 0;
        if (u === 'months') {
            if (target.getDate() !== orig.getDate()) return false;
            const mDiff = (target.getFullYear() - orig.getFullYear()) * 12 + (target.getMonth() - orig.getMonth());
            return mDiff >= 0 && mDiff % n === 0;
        }
    }
    return false;
}

function apptsForDate(targetDate) {
    const key = dKey(targetDate);
    const results = [];
    appts.forEach(a => {
        const rep = a.repeat;
        if (!rep || rep.type === 'none') {
            if (a.date === key) results.push(a);
        } else {
            if (isOccurrence(a, targetDate) && !(rep.excluded || []).includes(key)) results.push(a);
        }
    });
    return results;
}

function repLabel(rep) {
    if (!rep || rep.type === 'none') return '';
    if (rep.type === 'daily')   return '↻ Daily';
    if (rep.type === 'weekly')  return '↻ Weekly';
    if (rep.type === 'monthly') return '↻ Monthly';
    if (rep.type === 'custom') {
        const n = rep.interval || 1;
        const u = rep.unit || 'days';
        return `↻ Every ${n} ${u}`;
    }
    return '';
}

// ── Calendar render ───────────────────────────────────────────────────────────

function render() {
    updateLabel();
    buildGrid(curView === 'week' ? weekDates(curDate) : [curDate]);
    buildFilters();

    const panel = document.getElementById('tasksPanel');
    if (curView === 'day') {
        panel.classList.remove('hidden');
        buildTaskPanel(curDate);
    } else {
        panel.classList.add('hidden');
    }
}

function updateLabel() {
    const el = document.getElementById('curLabel');
    if (curView === 'week') {
        const [d0, d6] = [weekDates(curDate)[0], weekDates(curDate)[6]];
        el.textContent = d0.getMonth() === d6.getMonth()
            ? `${MONTHS[d0.getMonth()]} ${d0.getDate()}–${d6.getDate()}, ${d0.getFullYear()}`
            : `${MONTHS[d0.getMonth()].slice(0,3)} ${d0.getDate()} – ${MONTHS[d6.getMonth()].slice(0,3)} ${d6.getDate()}, ${d0.getFullYear()}`;
    } else {
        el.textContent = `${DAYS_L[curDate.getDay()]}, ${MONTHS[curDate.getMonth()]} ${curDate.getDate()}`;
    }
}

function buildGrid(dates) {
    const hh   = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hour-h')) || 62;
    const grid = document.getElementById('calGrid');
    grid.className = `cal-grid${curView==='day' ? ' day-view' : ''}`;
    grid.innerHTML = '';

    const tc = mkEl('div','time-col');
    tc.appendChild(mkEl('div','time-corner'));
    HOURS.forEach(h => {
        const c = mkEl('div','time-cell');
        c.textContent = h === 12 ? '12 PM' : h > 12 ? `${h-12} PM` : `${h} AM`;
        tc.appendChild(c);
    });
    grid.appendChild(tc);

    const dw = mkEl('div','days-wrap');
    dates.forEach(date => {
        const col = mkEl('div','day-col');

        const hdr = mkEl('div', `day-hdr${isToday(date) ? ' today' : ''}`);
        const dn  = mkEl('div','day-name'); dn.textContent = DAYS_S[date.getDay()];
        const num = mkEl('div','day-num');  num.textContent = date.getDate();
        hdr.appendChild(dn); hdr.appendChild(num);
        col.appendChild(hdr);

        const body = mkEl('div','day-body');

        HOURS.forEach(h => {
            const c = mkEl('div','h-cell');
            c.addEventListener('click', () => openAdd(dKey(date), `${pad(h)}:00`, `${pad(Math.min(h+1,23))}:00`));
            body.appendChild(c);
        });

        const dayAppts = apptsForDate(date).filter(a => activeF.has(a.category));
        const dayEls   = dayAppts.map(a => ({ appt: a, el: buildApptEl(a, hh, date) }));
        resolveOverlaps(dayEls, hh);
        dayEls.forEach(({ el }) => body.appendChild(el));

        if (isToday(date)) {
            const now = new Date();
            const min = now.getHours() * 60 + now.getMinutes();
            if (min >= START_H * 60 && min <= END_H * 60) {
                const line = mkEl('div','now-line');
                line.style.top = minToPx(min) + 'px';
                body.appendChild(line);
            }
        }

        col.appendChild(body);
        dw.appendChild(col);
    });
    grid.appendChild(dw);
}

function resolveOverlaps(eventEls, hh) {
    // Set z-index by priority so higher-priority events render on top
    eventEls.forEach(ev => {
        ev.el.style.zIndex = 2 + (PRIORITY[ev.appt.category] || 1);
    });

    eventEls.forEach((ev, i) => {
        const aPrio   = PRIORITY[ev.appt.category] || 1;
        const aTop    = minToPx(timeToMin(ev.appt.start));
        const aHeight = Math.max(((timeToMin(ev.appt.end) - timeToMin(ev.appt.start)) / 60) * hh, 18);
        const aBot    = aTop + aHeight;
        const textWrap = ev.el.querySelector('.appt-text');
        if (!textWrap) return;

        let paddingTop        = 0;     // push text down (overlap at top)
        let maxTextHeight     = aHeight; // clip text height (overlap at bottom)
        let hasOverlapAtTop   = false;
        let hasOverlapAtBot   = false;
        let hideAll           = false;

        eventEls.forEach((other, j) => {
            if (i === j || hideAll) return;
            const bPrio = PRIORITY[other.appt.category] || 1;
            if (bPrio <= aPrio) return; // only care about higher-priority events

            const bTop    = minToPx(timeToMin(other.appt.start));
            const bHeight = Math.max(((timeToMin(other.appt.end) - timeToMin(other.appt.start)) / 60) * hh, 18);
            const bBot    = bTop + bHeight;

            if (aTop >= bBot || aBot <= bTop) return; // no overlap

            const ovTop = Math.max(aTop, bTop) - aTop; // local coords, >=0
            const ovBot = Math.min(aBot, bBot) - aTop; // local coords, <=aHeight
            const thresh = 3;

            if (ovTop <= thresh && ovBot >= aHeight - thresh) {
                hideAll = true; // fully covered
            } else if (ovTop <= thresh) {
                hasOverlapAtTop = true;
                paddingTop = Math.max(paddingTop, ovBot);
            } else if (ovBot >= aHeight - thresh) {
                hasOverlapAtBot = true;
                maxTextHeight = Math.min(maxTextHeight, ovTop);
            } else {
                hideAll = true; // middle overlap — complex, hide all
            }
        });

        if (hideAll || (hasOverlapAtTop && hasOverlapAtBot)) {
            textWrap.style.display = 'none';
        } else if (hasOverlapAtTop) {
            textWrap.style.paddingTop = paddingTop + 'px';
        } else if (hasOverlapAtBot) {
            textWrap.style.maxHeight = maxTextHeight + 'px';
            textWrap.style.overflow  = 'hidden';
        }
    });
}

function buildApptEl(a, hh, date) {
    const cat    = CATS[a.category] || CATS.personal;
    const top    = minToPx(timeToMin(a.start));
    const height = Math.max(((timeToMin(a.end) - timeToMin(a.start)) / 60) * hh, 18);
    const isRec  = a.repeat && a.repeat.type !== 'none';

    const div = mkEl('div','appt');
    div.style.cssText = `top:${top}px;height:${height}px;background:${cat.bg};border-left-color:${cat.color};color:${cat.color}`;

    const textWrap = mkEl('div', 'appt-text');
    const t = mkEl('div','appt-title'); t.textContent = a.title;
    textWrap.appendChild(t);

    if (height > 30) {
        const tm = mkEl('div','appt-time');
        tm.textContent = `${fmt12(a.start)} – ${fmt12(a.end)}${isRec ? ' ↻' : ''}`;
        textWrap.appendChild(tm);
    }
    div.appendChild(textWrap);

    div.addEventListener('click', e => { e.stopPropagation(); showPopup(a.id, dKey(date), e); });
    return div;
}

function buildFilters() {
    const cont = document.getElementById('filters');
    cont.innerHTML = '';
    Object.entries(CATS).forEach(([k, cat]) => {
        const on   = activeF.has(k);
        const chip = mkEl('div', `chip${on ? '' : ' off'}`);
        chip.style.cssText = on
            ? `background:${cat.bg};border-color:${cat.color}44;color:${cat.color}`
            : `background:transparent;border-color:var(--border);color:var(--muted)`;
        const dot = mkEl('span','dot'); dot.style.background = cat.color;
        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(cat.label));
        chip.addEventListener('click', () => {
            activeF.has(k) ? (activeF.size > 1 && activeF.delete(k)) : activeF.add(k);
            render();
        });
        cont.appendChild(chip);
    });
}

// ── Navigation ────────────────────────────────────────────────────────────────

function nav(dir) {
    const d = new Date(curDate);
    d.setDate(d.getDate() + dir * (curView === 'week' ? 7 : 1));
    curDate = d;
    render();
}

function goToday() {
    curDate = new Date();
    render();
    setTimeout(scrollToNow, 30);
}

function setView(v) {
    curView = v;
    document.getElementById('btnWeek').className = `vbtn${v==='week'?' active':''}`;
    document.getElementById('btnDay').className  = `vbtn${v==='day'?' active':''}`;
    render();
}

function scrollToNow() {
    const now = new Date();
    const min = now.getHours() * 60 + now.getMinutes();
    document.getElementById('calWrap').scrollTop = Math.max(0, minToPx(min) - 120);
}

// ── Task panel ────────────────────────────────────────────────────────────────

function buildTaskPanel(date) {
    const key     = dKey(date);
    // A task appears in the pinned section for a given date if:
    // - it's currently pinned (or was ever pinned, via pinnedUntil), AND
    // - the date is on or after pinnedFrom (if set), AND
    // - the date is before pinnedUntil (if set — means it was later unpinned)
    const pinned  = tasks.filter(t => {
        if (!t.pinned && !t.pinnedUntil) return false;
        if (t.pinnedFrom   && key <  t.pinnedFrom)   return false;
        if (t.pinnedUntil  && key >= t.pinnedUntil)  return false;
        return true;
    });
    const regular = tasks.filter(t => !t.pinned && t.date === key);
    const list    = document.getElementById('tpList');
    list.innerHTML = '';

    if (pinned.length === 0 && regular.length === 0) {
        const e = mkEl('div','tp-empty');
        e.textContent = 'No tasks — add one above';
        list.appendChild(e);
        return;
    }

    // Pinned tasks (always at top)
    if (pinned.length > 0) {
        const lbl = mkEl('div','tp-section');
        lbl.textContent = 'Pinned – Daily';
        list.appendChild(lbl);
        pinned.forEach(t => list.appendChild(mkTaskItem(t, key, 'pinned')));
    }

    // Regular tasks for this day
    if (regular.length > 0) {
        const lbl = mkEl('div','tp-section');
        lbl.textContent = "Today's";
        list.appendChild(lbl);
        regular.forEach(t => list.appendChild(mkTaskItem(t, key, 'regular')));
    }
}

// SVG constants for task items
const SVG_PIN = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
  <path d="M4.146.146A.5.5 0 0 1 4.5 0h7a.5.5 0 0 1 .5.5c0 .68-.342 1.174-.646 1.479-.126.125-.25.224-.354.298v4.431l.078.048c.203.127.476.314.751.555C12.36 7.775 13 8.527 13 9.5a.5.5 0 0 1-.5.5h-4v4.5c0 .276-.224 1.5-.5 1.5s-.5-1.224-.5-1.5V10h-4a.5.5 0 0 1-.5-.5c0-.973.64-1.725 1.17-2.189A5.921 5.921 0 0 1 5 6.708V2.277a2.77 2.77 0 0 1-.354-.298C4.342 1.674 4 1.179 4 .5a.5.5 0 0 1 .146-.354z"/>
</svg>`;
const SVG_GRIP = `<svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor" aria-hidden="true">
  <circle cx="3" cy="2"  r="1.5"/><circle cx="7" cy="2"  r="1.5"/>
  <circle cx="3" cy="7"  r="1.5"/><circle cx="7" cy="7"  r="1.5"/>
  <circle cx="3" cy="12" r="1.5"/><circle cx="7" cy="12" r="1.5"/>
</svg>`;

function mkTaskItem(task, dateKey, group) {
    // Use completedDates for any task that was ever pinned (current or historical)
    const everPinned = task.pinned || !!task.pinnedFrom;
    const checked = everPinned
        ? (task.completedDates || []).includes(dateKey)
        : !!task.completed;
    // A "historical" pinned task is one unpinned before this date — show it
    // as read-only pinned (no re-pin button) to avoid confusion
    const isHistorical = !task.pinned && !!task.pinnedUntil;

    const item = mkEl('div', `task-item${(task.pinned || isHistorical) ? ' pinned' : ''}`);
    item.draggable        = true;
    item.dataset.id       = task.id;
    item.dataset.group    = group;

    // Drag handle
    const handle = mkEl('span', 'drag-handle');
    handle.innerHTML = SVG_GRIP;

    // Checkbox
    const chk = mkEl('div', `task-check${checked ? ' checked' : ''}`);
    chk.addEventListener('click', e => { e.stopPropagation(); toggleTask(task.id, dateKey); });

    // Text
    const txt = mkEl('span', `task-text${checked ? ' done' : ''}`);
    txt.textContent = task.text;

    // Pin button
    const pin = mkEl('button', `task-pin-btn${task.pinned ? ' active' : ''}`);
    pin.innerHTML = SVG_PIN;
    pin.title = task.pinned ? 'Unpin task' : 'Pin to every day';
    pin.addEventListener('click', e => { e.stopPropagation(); toggleTaskPin(task.id); });

    // Delete button
    const del = mkEl('button', 'task-del');
    del.textContent = '×';
    del.title = 'Remove task';
    del.addEventListener('click', e => { e.stopPropagation(); deleteTask(task.id); });

    item.append(handle, chk, txt, pin, del);
    enableDrag(item, task.id, group);
    return item;
}

function addTask() {
    const input = document.getElementById('tpInput');
    const text  = input.value.trim();
    if (!text) { input.focus(); return; }

    tasks.push({ id: uid(), text, pinned: false, date: dKey(curDate), completed: false });
    saveTasks();
    input.value = '';
    buildTaskPanel(curDate);
    input.focus();
}

function toggleTask(id, dateKey) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    // Use per-date completedDates for current pinned tasks and historical pinned tasks
    if (t.pinned || t.pinnedFrom) {
        if (!t.completedDates) t.completedDates = [];
        const i = t.completedDates.indexOf(dateKey);
        i !== -1 ? t.completedDates.splice(i, 1) : t.completedDates.push(dateKey);
    } else {
        t.completed = !t.completed;
    }
    saveTasks();
    buildTaskPanel(curDate);
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    buildTaskPanel(curDate);
}

function toggleTaskPin(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    if (t.pinned) {
        // Unpin → stop showing as pinned from today onwards, but keep history
        // for past dates (pinnedFrom..today-1 still visible via pinnedUntil check)
        t.pinned      = false;
        t.pinnedUntil = dKey(curDate); // pinned section hides on dates >= this
        t.date        = dKey(curDate); // show as a regular task for today
        t.completed   = false;
        // Intentionally keep pinnedFrom + completedDates for historical display
    } else {
        // Pin → start showing as pinned from today onwards only
        t.pinned         = true;
        t.pinnedFrom     = dKey(curDate); // pinned section shows on dates >= this
        t.date           = null;
        t.completedDates = t.completedDates || [];
        delete t.completed;
        delete t.pinnedUntil;
    }
    saveTasks();
    buildTaskPanel(curDate);
}

// ── Drag-and-drop ─────────────────────────────────────────────────────────────

function enableDrag(el, taskId, group) {
    el.addEventListener('dragstart', e => {
        dragId    = taskId;
        dragGroup = group;
        e.dataTransfer.effectAllowed = 'move';
        // Defer adding class so the ghost image isn't faded
        requestAnimationFrame(() => el.classList.add('dragging'));
    });

    el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        clearDragUI();
        dragId = null; dragGroup = null;
    });

    el.addEventListener('dragover', e => {
        if (el.dataset.group !== dragGroup || el.dataset.id === dragId) {
            e.dataTransfer.dropEffect = 'none';
            return;
        }
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        clearDragUI();
        const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
        el.classList.add(e.clientY < mid ? 'drag-before' : 'drag-after');
    });

    el.addEventListener('dragleave', e => {
        if (!el.contains(e.relatedTarget)) {
            el.classList.remove('drag-before', 'drag-after');
        }
    });

    el.addEventListener('drop', e => {
        e.preventDefault();
        if (el.dataset.group !== dragGroup || el.dataset.id === dragId) return;
        const before = el.classList.contains('drag-before');
        clearDragUI();
        dropTask(dragId, el.dataset.id, before);
    });
}

function clearDragUI() {
    document.querySelectorAll('.drag-before,.drag-after')
        .forEach(el => el.classList.remove('drag-before','drag-after'));
}

function dropTask(fromId, toId, insertBefore) {
    if (fromId === toId) return;
    const fromIdx = tasks.findIndex(t => t.id === fromId);
    if (fromIdx === -1) return;
    const [moved] = tasks.splice(fromIdx, 1);
    const toIdx = tasks.findIndex(t => t.id === toId);
    tasks.splice(toIdx === -1 ? tasks.length : (insertBefore ? toIdx : toIdx + 1), 0, moved);
    saveTasks();
    buildTaskPanel(curDate);
}

// ── Appointment modal ─────────────────────────────────────────────────────────

function openAdd(date, start, end) {
    editId = null;
    document.getElementById('modalH').textContent  = 'New Appointment';
    document.getElementById('fTitle').value        = '';
    document.getElementById('fTitle').classList.remove('err');
    document.getElementById('fDate').value         = date  || dKey(curDate);
    document.getElementById('fStart').value        = start || '09:00';
    document.getElementById('fEnd').value          = end   || '10:00';
    document.getElementById('fNotes').value        = '';
    clearEndErr();
    setRepeatUI({ type: 'none' });
    renderCatGrid('school');
    document.getElementById('overlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('fTitle').focus(), 50);
}

function openEdit(a, dateKey) {
    editId   = a.id;
    editDate = dateKey || a.date;
    document.getElementById('modalH').textContent  = 'Edit Appointment';
    document.getElementById('fTitle').value        = a.title;
    document.getElementById('fTitle').classList.remove('err');
    document.getElementById('fDate').value         = editDate;
    document.getElementById('fStart').value        = a.start;
    document.getElementById('fEnd').value          = a.end;
    document.getElementById('fNotes').value        = a.notes || '';
    clearEndErr();
    setRepeatUI(a.repeat || { type: 'none' });
    renderCatGrid(a.category);
    document.getElementById('overlay').classList.remove('hidden');
}

function setRepeatUI(rep) {
    const type = rep?.type || 'none';
    document.getElementById('fRepeat').value  = type;
    document.getElementById('fUntil').value   = rep?.until || '';
    document.getElementById('fInterval').value = type === 'custom' ? (rep.interval || 1) : 1;
    document.getElementById('fUnit').value     = type === 'custom' ? (rep.unit || 'days') : 'days';
    onRepeatChange();
}

function onRepeatChange() {
    const v = document.getElementById('fRepeat').value;
    document.getElementById('customRow').classList.toggle('hidden', v !== 'custom');
    document.getElementById('untilRow').classList.toggle('hidden', v === 'none');
}

function getRepeatData() {
    const type = document.getElementById('fRepeat').value;
    if (type === 'none') return { type: 'none' };
    const rep = { type, until: document.getElementById('fUntil').value || null };
    if (type === 'custom') {
        rep.interval = Math.max(1, parseInt(document.getElementById('fInterval').value) || 1);
        rep.unit     = document.getElementById('fUnit').value;
    }
    if (editId) {
        const orig = appts.find(x => x.id === editId);
        if (orig?.repeat?.excluded) rep.excluded = orig.repeat.excluded;
    }
    return rep;
}

function renderCatGrid(sel) {
    selCat = sel;
    const g = document.getElementById('catGrid');
    g.innerHTML = '';
    Object.entries(CATS).forEach(([k, cat]) => {
        const btn = mkEl('button', `cat-opt${k===sel?' sel':''}`);
        if (k === sel) btn.style.background = cat.color;
        const dot = mkEl('span','cdot');
        dot.style.background = k === sel ? 'rgba(255,255,255,0.55)' : cat.color;
        btn.appendChild(dot);
        btn.appendChild(document.createTextNode(cat.label));
        btn.addEventListener('click', () => renderCatGrid(k));
        g.appendChild(btn);
    });
}

function clearEndErr() {
    document.getElementById('fEnd').classList.remove('err');
    document.getElementById('fEndErr').classList.remove('show');
}
function showEndErr() {
    document.getElementById('fEnd').classList.add('err');
    document.getElementById('fEndErr').classList.add('show');
}

function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
    editId = null;
    editDate = null;
}
function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
}

// Stores validated form data while the repeat-scope dialog is open
let _pendingSave = null;

function saveAppt() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) {
        document.getElementById('fTitle').classList.add('err');
        document.getElementById('fTitle').focus();
        return;
    }
    const start = document.getElementById('fStart').value;
    const end   = document.getElementById('fEnd').value;
    if (!start || !end || timeToMin(end) <= timeToMin(start)) {
        showEndErr();
        document.getElementById('fEnd').focus();
        return;
    }
    const formData = {
        title,
        category: selCat,
        date:     document.getElementById('fDate').value,
        start, end,
        notes:    document.getElementById('fNotes').value.trim(),
        repeat:   getRepeatData(),
    };

    // If editing a recurring event, ask the user what scope to apply
    if (editId) {
        const orig = appts.find(x => x.id === editId);
        if (orig && orig.repeat && orig.repeat.type !== 'none') {
            _pendingSave = formData;
            document.getElementById('repeatScopeOverlay').classList.remove('hidden');
            return;
        }
    }

    _commitSave(formData, null);
}

function _commitSave(formData, scope) {
    pushUndo();
    if (scope === 'one') {
        // Exclude the edited occurrence from the original series
        const orig = appts.find(x => x.id === editId);
        if (orig) {
            if (!orig.repeat.excluded) orig.repeat.excluded = [];
            if (!orig.repeat.excluded.includes(editDate)) orig.repeat.excluded.push(editDate);
        }
        // Create a standalone copy for just this occurrence
        appts.push({
            id:       uid(),
            title:    formData.title,
            category: formData.category,
            date:     editDate,
            start:    formData.start,
            end:      formData.end,
            notes:    formData.notes,
            repeat:   { type: 'none' },
        });
    } else {
        // Edit all: update the base event
        const a = {
            id:       editId || uid(),
            title:    formData.title,
            category: formData.category,
            date:     formData.date,
            start:    formData.start,
            end:      formData.end,
            notes:    formData.notes,
            repeat:   formData.repeat,
        };
        if (editId) {
            const i = appts.findIndex(x => x.id === editId);
            i !== -1 ? appts[i] = a : appts.push(a);
        } else {
            appts.push(a);
        }
    }
    save(); closeModal(); render();
}

function confirmRepeatScope(scope) {
    document.getElementById('repeatScopeOverlay').classList.add('hidden');
    if (_pendingSave) { _commitSave(_pendingSave, scope); _pendingSave = null; }
}

function cancelRepeatScope() {
    document.getElementById('repeatScopeOverlay').classList.add('hidden');
    _pendingSave = null;
}

// ── Time validation listeners ─────────────────────────────────────────────────

document.getElementById('fStart').addEventListener('change', function () {
    clearEndErr();
    const startMin = timeToMin(this.value);
    const endEl    = document.getElementById('fEnd');
    if (endEl.value && timeToMin(endEl.value) <= startMin) {
        const newEnd = Math.min(startMin + 60, 23 * 60);
        endEl.value  = `${pad(Math.floor(newEnd / 60))}:${pad(newEnd % 60)}`;
    }
});

document.getElementById('fEnd').addEventListener('change', function () {
    const startEl = document.getElementById('fStart');
    if (startEl.value && timeToMin(this.value) <= timeToMin(startEl.value)) {
        showEndErr();
    } else {
        clearEndErr();
    }
});

// ── Popup ─────────────────────────────────────────────────────────────────────

function showPopup(id, dateKey, e) {
    closePopup();
    const a = appts.find(x => x.id === id);
    if (!a) return;
    const cat = CATS[a.category] || CATS.personal;
    popupId = id; popupDate = dateKey;

    const pb = document.getElementById('pBadge');
    pb.textContent   = cat.label;
    pb.style.cssText = `background:${cat.bg};color:${cat.color}`;

    document.getElementById('pTitle').textContent = a.title;
    document.getElementById('pTime').textContent  = `${fmt12(a.start)} – ${fmt12(a.end)}`;

    const pr = document.getElementById('pRepeat');
    const rl = repLabel(a.repeat);
    pr.textContent   = rl;
    pr.style.display = rl ? 'block' : 'none';

    const pn = document.getElementById('pNotes');
    pn.textContent   = a.notes || '';
    pn.style.display = a.notes ? 'block' : 'none';

    const isRec = a.repeat && a.repeat.type !== 'none';
    document.getElementById('pDelOne').classList.toggle('hidden', isRec);
    document.getElementById('pDelLabel').classList.toggle('hidden', !isRec);
    document.getElementById('pDelThis').classList.toggle('hidden', !isRec);
    document.getElementById('pDelAll').classList.toggle('hidden', !isRec);

    const popup = document.getElementById('popup');
    popup.classList.remove('hidden');

    const vw = window.innerWidth, vh = window.innerHeight;
    popup.style.left = Math.min(e.clientX + 12, vw - 242) + 'px';
    popup.style.top  = Math.min(e.clientY +  8, vh - 200) + 'px';

    setTimeout(() => document.addEventListener('click', outsidePopup, {once:true}), 0);
}

function outsidePopup(e) {
    if (!document.getElementById('popup').contains(e.target)) closePopup();
}
function closePopup() {
    document.getElementById('popup').classList.add('hidden');
    popupId = null; popupDate = null;
}
function popupEdit() {
    const a = appts.find(x => x.id === popupId);
    if (a) { closePopup(); openEdit(a, popupDate); }
}
function popupDelete() {
    if (!popupId) return;
    pushUndo();
    appts = appts.filter(x => x.id !== popupId);
    save(); closePopup(); render();
}
function popupDeleteThis() {
    const a = appts.find(x => x.id === popupId);
    if (!a || !popupDate) return;
    pushUndo();
    if (!a.repeat.excluded) a.repeat.excluded = [];
    if (!a.repeat.excluded.includes(popupDate)) a.repeat.excluded.push(popupDate);
    save(); closePopup(); render();
}
function popupDeleteAll() {
    if (!popupId) return;
    pushUndo();
    appts = appts.filter(x => x.id !== popupId);
    save(); closePopup(); render();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
    // Never intercept when the user is typing
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

    const modalOpen = !document.getElementById('overlay').classList.contains('hidden');
    const popupOpen = !document.getElementById('popup').classList.contains('hidden');

    // Escape closes modal or popup
    if (e.key === 'Escape') {
        if (modalOpen)     { e.preventDefault(); closeModal();  return; }
        if (popupOpen)     { e.preventDefault(); closePopup();  return; }
        return;
    }

    // Nothing below should fire while a modal is open
    if (modalOpen || popupOpen) return;

    // N — new event on current day
    if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        openAdd(curDate, '09:00', '10:00');
        return;
    }

    // Arrow keys — navigate weeks (or days in day view)
    if (e.key === 'ArrowLeft') {
        e.preventDefault();
        nav(-1);
        return;
    }
    if (e.key === 'ArrowRight') {
        e.preventDefault();
        nav(1);
        return;
    }

    // T — go to today
    if (e.key === 't' || e.key === 'T') {
        e.preventDefault();
        goToday();
        return;
    }

    // Ctrl/Cmd + Z — undo
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undo();
        return;
    }
});

// ── Init ──────────────────────────────────────────────────────────────────────

renderCatGrid('school');
render();
scrollToNow();
</script>
